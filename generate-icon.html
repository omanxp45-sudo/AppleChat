<!DOCTYPE html>
<html>
<head><title>Generate Icon</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<a id="dl192" download="icon-192.png">Download 192px</a>
&nbsp;&nbsp;
<a id="dl512" download="icon-512.png">Download 512px</a>

<script>
function drawApple(canvas) {
    var w = canvas.width, h = canvas.height;
    var s = w / 512;
    var ctx = canvas.getContext('2d');

    // Background rounded rect
    var r = 90 * s;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(w - r, 0);
    ctx.quadraticCurveTo(w, 0, w, r);
    ctx.lineTo(w, h - r);
    ctx.quadraticCurveTo(w, h, w - r, h);
    ctx.lineTo(r, h);
    ctx.quadraticCurveTo(0, h, 0, h - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#b03025';
    ctx.fill();

    ctx.scale(s, s);

    // Apple body
    ctx.beginPath();
    ctx.fillStyle = '#fff';
    ctx.ellipse(232, 196, 42, 38, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(334, 196, 42, 38, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(326, 204);
    ctx.bezierCurveTo(310, 204, 296, 212, 283, 212);
    ctx.bezierCurveTo(270, 212, 254, 204, 236, 204);
    ctx.bezierCurveTo(196, 204, 160, 238, 160, 290);
    ctx.bezierCurveTo(160, 358, 210, 420, 248, 420);
    ctx.bezierCurveTo(260, 420, 270, 414, 283, 414);
    ctx.bezierCurveTo(296, 414, 306, 420, 322, 420);
    ctx.bezierCurveTo(362, 420, 406, 356, 406, 290);
    ctx.bezierCurveTo(406, 238, 368, 204, 326, 204);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Center dip
    ctx.beginPath();
    ctx.ellipse(283, 198, 22, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#b03025';
    ctx.fill();

    // Shine
    ctx.save();
    ctx.translate(218, 258);
    ctx.rotate(-20 * Math.PI / 180);
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 32, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fill();
    ctx.restore();

    // Stem
    ctx.beginPath();
    ctx.roundRect(272, 118, 18, 58, 9);
    ctx.fillStyle = '#5d4037';
    ctx.fill();

    // Leaf
    ctx.save();
    ctx.translate(316, 132);
    ctx.rotate(-35 * Math.PI / 180);
    ctx.beginPath();
    ctx.ellipse(0, 0, 42, 16, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#27ae60';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 30, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2ecc71';
    ctx.fill();
    ctx.restore();
}

var c192 = document.getElementById('c192');
var c512 = document.getElementById('c512');
drawApple(c192);
drawApple(c512);

document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl512').href = c512.toDataURL('image/png');
</script>
</body>
</html>
