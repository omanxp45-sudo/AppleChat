<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Universal and confidential chat, where you can communicate with others, privately or publicly">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- Open Graph / WhatsApp preview -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://omanxp45-sudo.github.io/AppleChat/">
<meta property="og:title"       content="ApplesChat">
<meta property="og:description" content="Universal and confidential chat — communicate with others, privately or publicly.">
<meta property="og:image"       content="https://omanxp45-sudo.github.io/AppleChat/57AweD4.png">
<meta property="og:image:width"  content="128">
<meta property="og:image:height" content="128">
<meta name="twitter:card"       content="summary">
<meta name="twitter:image"      content="https://omanxp45-sudo.github.io/AppleChat/57AweD4.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<title>ApplesChat</title>
<link rel="icon" href="57AweD4.png" sizes="any">
<link rel="icon" href="57AweD4.png" type="image/png" sizes="128x128">
<link rel="shortcut icon" href="57AweD4.png">
<link rel="apple-touch-icon" href="57AweD4.png">
<style>
.banner {
    width: 100%;
    height: 50px;
    background-color: lime;
    text-align: center;
}
.userInfoDiv {
    margin: 20px auto;
    border: 3px solid red;
    padding: 15px;
    width: min(320px, calc(100% - 24px));
    background-color: lightblue;
    box-shadow: 10px 10px 8px red;
}
#avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: block;
    margin: 10px auto;
    object-fit: cover;
    border: 3px solid red;
    cursor: pointer;
    transition: opacity 0.2s;
}
#avatar:hover { opacity: 0.8; }
.avatar-hint {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-bottom: 10px;
}
#myUserName, #status {
    width: 100%;
    border: 2px solid blue;
    border-radius: 4px;
    padding: 5px 8px;
    margin-top: 4px;
    box-sizing: border-box;
    /* Prevent iOS zoom on focus */
    font-size: 16px;
    touch-action: manipulation;
}
#myUserName { color: red; }
label { font-weight: bold; }
.EnterChatBtn { text-align: center; margin: 15px 0; }
#statusMsg { text-align: center; font-size: 13px; min-height: 18px; margin-top: 8px; }
</style>
</head>
<body>

<div class="banner">
    <img style="width:40px;height:40px" src="https://imgur.com/57AweD4.png" alt="LOGO">
    <span style="font-family: Times New Roman; font-size: 30px; color: red">ApplesChat</span>
</div>

<div class="userInfoDiv">
    <!-- Click avatar to change it -->
    <img alt="Avatar" id="avatar"
         src="https://imgur.com/PVBYWRJ.png"
         title="Click to change avatar"
         onclick="document.getElementById('fileInput').click()">

    <p class="avatar-hint">
        Click avatar to change &nbsp;|&nbsp;
        <a href="#" onclick="resetAvatar(); return false;">Use Default</a>
    </p>
    <input id="fileInput" type="file" accept="image/*" style="display:none">

    <label for="myUserName">Username:</label>
    <input id="myUserName"
           type="text"
           placeholder="Letters &amp; numbers only, max 15"
           maxlength="15"
           onkeypress="return avoidSpace(event)">

    <br><br>

    <label for="status">Status:</label>
    <input id="status"
           type="text"
           placeholder="What's on your mind?"
           maxlength="25">

    <div id="statusMsg"></div>
</div>

<div class="EnterChatBtn">
    <button type="button" class="btn btn-primary btn-lg" onclick="enterChat()">
        <img src="https://imgur.com/57AweD4.png" style="width:20px;height:20px" alt="">
        Enter ApplesChat
    </button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    var DEFAULT_AVATAR = 'https://imgur.com/PVBYWRJ.png';

    // ── Restore saved values ──────────────────────────────────────────────────
    window.onload = function () {
        document.getElementById('myUserName').value = localStorage.getItem('myUserName') || '';
        document.getElementById('status').value     = localStorage.getItem('status')     || '';

        var savedAvatar = localStorage.getItem('avatarImgData');
        if (savedAvatar) document.getElementById('avatar').src = savedAvatar;

        // File-picker → resize to 60×60 JPEG → store in localStorage
        document.getElementById('fileInput').onchange = function () {
            var file = this.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                resizeAndStore(e.target.result);
            };
            reader.readAsDataURL(file);
        };
    };

    // ── Resize image to 60×60 and save to localStorage ────────────────────────
    function resizeAndStore(dataUrl) {
        var img = new Image();
        img.onload = function () {
            var canvas = document.createElement('canvas');
            canvas.width  = 60;
            canvas.height = 60;
            canvas.getContext('2d').drawImage(img, 0, 0, 60, 60);
            var small = canvas.toDataURL('image/jpeg', 0.75);
            localStorage.setItem('avatarImgData', small);
            document.getElementById('avatar').src = small;
        };
        img.src = dataUrl;
    }

    // ── Reset to default avatar ───────────────────────────────────────────────
    function resetAvatar() {
        localStorage.removeItem('avatarImgData');
        document.getElementById('avatar').src = DEFAULT_AVATAR;
    }

    // ── Block spaces in username ──────────────────────────────────────────────
    function avoidSpace(e) {
        return (e.which || e.keyCode) !== 32;
    }

    function setMsg(text, color) {
        var el = document.getElementById('statusMsg');
        el.style.color   = color || '#555';
        el.textContent   = text;
    }

    // ── Validate → save to Firebase → go to chat ─────────────────────────────
    function enterChat() {
        var username = document.getElementById('myUserName').value.trim();
        var status   = document.getElementById('status').value.trim();
        var avatar   = localStorage.getItem('avatarImgData') || DEFAULT_AVATAR;

        if (!/^[A-Za-z0-9]{1,15}$/.test(username)) {
            setMsg('Username must be 1–15 letters/numbers, no spaces.', 'red');
            document.getElementById('myUserName').focus();
            return;
        }

        // Save locally
        localStorage.setItem('myUserName', username);
        localStorage.setItem('status',     status);

        setMsg('Connecting…');

        // Save profile to Firebase, then redirect.
        // Wrapped in try-catch so a misconfigured Firebase never blocks entry.
        try {
            var db = firebase.database();
            db.ref('users/' + username).set({
                username:  username,
                status:    status,
                avatar:    avatar,
                lastSeen:  firebase.database.ServerValue.TIMESTAMP
            })
            .then(function () {
                window.location.href = 'ApplesChat.html';
            })
            .catch(function (err) {
                console.warn('Firebase write failed:', err.message);
                window.location.href = 'ApplesChat.html';
            });
        } catch (err) {
            console.warn('Firebase error:', err.message);
            window.location.href = 'ApplesChat.html';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keyup', function (e) {
        if (e.keyCode === 13) enterChat();
    });
</script>

</body>
</html>
