<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Universal and confidential chat, where you can communicate with others, privately or publicly">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://appleschat.com/">
<meta property="og:title"       content="ApplesChat">
<meta property="og:description" content="Universal and confidential chat — communicate with others, privately or publicly.">
<meta property="og:image"        content="https://appleschat.com/og-preview-v2.png">
<meta property="og:image:width"  content="630">
<meta property="og:image:height" content="630">
<meta name="twitter:card"        content="summary">
<meta name="twitter:image"       content="https://appleschat.com/og-preview-v2.png">
<link rel="manifest" href="manifest.json">
<title>ApplesChat</title>
<link rel="icon" href="57AweD4.png" sizes="any">
<link rel="apple-touch-icon" href="57AweD4.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

.banner {
    width: 100%; height: 54px;
    background: linear-gradient(90deg, #25d366, #128c7e);
    display: flex; align-items: center; justify-content: center; gap: 10px;
}
.banner img { width: 36px; height: 36px; border-radius: 8px; }
.banner span { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }

.card {
    width: min(340px, calc(100% - 24px));
    margin: 32px auto;
    background: #fff;
    border-radius: 18px;
    padding: 28px 24px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}

.card h2 { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 6px; color: #111; }
.card p  { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px; }

.avatar-wrap { text-align: center; margin-bottom: 18px; }
#avatar {
    width: 80px; height: 80px; border-radius: 50%;
    object-fit: cover; border: 3px solid #25d366;
    cursor: pointer; transition: opacity 0.2s; display: inline-block;
}
#avatar:hover { opacity: 0.8; }
.avatar-hint { font-size: 11px; color: #888; margin-top: 5px; }
.avatar-hint a { color: #128c7e; text-decoration: none; }

label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
input[type=text] {
    width: 100%; border: 1.5px solid #dde; border-radius: 10px;
    padding: 10px 12px; font-size: 15px; outline: none;
    transition: border-color 0.15s; margin-bottom: 14px;
}
input[type=text]:focus { border-color: #25d366; }

.enter-btn {
    width: 100%; padding: 12px; border: none; border-radius: 12px;
    background: linear-gradient(90deg, #25d366, #128c7e);
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
}
.enter-btn:hover { opacity: 0.9; }
.enter-btn:disabled { opacity: 0.5; cursor: default; }

#errMsg { font-size: 13px; color: #dc3545; text-align: center; min-height: 18px; margin-top: 8px; }
</style>
</head>
<body>

<div class="banner">
    <img src="57AweD4.png" alt="logo">
    <span>ApplesChat</span>
</div>

<div class="card">
    <h2>Welcome to ApplesChat</h2>
    <p>Enter a username to start chatting</p>

    <div class="avatar-wrap">
        <img id="avatar" src="https://i.imgur.com/PVBYWRJ.png" alt="Avatar" title="Click to change avatar"
             onclick="document.getElementById('fileInput').click()">
        <div class="avatar-hint">
            Tap to change &nbsp;|&nbsp;
            <a href="#" onclick="resetAvatar(); return false;">Reset</a>
        </div>
    </div>
    <input id="fileInput" type="file" accept="image/*" style="display:none">

    <label for="usernameInput">Username <span style="color:#dc3545">*</span></label>
    <input id="usernameInput" type="text" placeholder="Letters &amp; numbers, max 15"
           maxlength="15" autocomplete="off" spellcheck="false"
           oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'')">

    <label for="statusInput">Status <span style="color:#aaa;font-weight:400">(optional)</span></label>
    <input id="statusInput" type="text" placeholder="What's on your mind?" maxlength="25">

    <button class="enter-btn" onclick="enterChat()">Enter ApplesChat</button>
    <div id="errMsg"></div>
</div>

<script>
var DEFAULT_AVATAR = 'https://i.imgur.com/PVBYWRJ.png';

// Restore saved values
window.onload = function () {
    var saved = localStorage.getItem('myUserName');
    if (saved) document.getElementById('usernameInput').value = saved;
    var savedStatus = localStorage.getItem('status');
    if (savedStatus) document.getElementById('statusInput').value = savedStatus;
    var savedAvatar = localStorage.getItem('avatarImgData');
    if (savedAvatar) document.getElementById('avatar').src = savedAvatar;

    document.getElementById('fileInput').onchange = function () {
        var file = this.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) { resizeAndStore(e.target.result); };
        reader.readAsDataURL(file);
    };
};

function resizeAndStore(dataUrl) {
    var img = new Image();
    img.onload = function () {
        var canvas = document.createElement('canvas');
        canvas.width = 60; canvas.height = 60;
        canvas.getContext('2d').drawImage(img, 0, 0, 60, 60);
        var small = canvas.toDataURL('image/jpeg', 0.75);
        localStorage.setItem('avatarImgData', small);
        document.getElementById('avatar').src = small;
    };
    img.src = dataUrl;
}

function resetAvatar() {
    localStorage.removeItem('avatarImgData');
    document.getElementById('avatar').src = DEFAULT_AVATAR;
}

function enterChat() {
    var username = document.getElementById('usernameInput').value.trim();
    var status   = document.getElementById('statusInput').value.trim();
    var errEl    = document.getElementById('errMsg');

    if (!username) {
        errEl.textContent = 'Please enter a username.';
        document.getElementById('usernameInput').focus();
        return;
    }
    if (!/^[A-Za-z0-9]{1,15}$/.test(username)) {
        errEl.textContent = '1–15 letters/numbers only, no spaces.';
        document.getElementById('usernameInput').focus();
        return;
    }
    errEl.textContent = '';

    localStorage.setItem('myUserName', username);
    localStorage.setItem('status', status);

    window.location.href = 'ApplesChat.html';
}

// Enter key support
document.addEventListener('keyup', function (e) {
    if (e.key === 'Enter') enterChat();
});
</script>

</body>
</html>
