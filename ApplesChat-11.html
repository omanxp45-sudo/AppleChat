<style>
/* ── Reset & layout ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

.chat-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 600px;
    margin: 0 auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

/* ── Header ──────────────────────────────────────────────────────────────── */
.chat-header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 10;
}

.chat-header .logo {
    width: 36px;
    height: 36px;
}

.chat-header .app-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
}

.chat-header .header-user {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    text-decoration: none;
    color: white;
}

.chat-header .header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.6);
}

.chat-header .header-name {
    font-size: 13px;
    font-weight: 600;
    max-width: 90px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

/* ── Status bar ──────────────────────────────────────────────────────────── */
.status-bar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 5px 16px;
    font-size: 12px;
    color: #666;
    text-align: center;
    flex-shrink: 0;
    min-height: 26px;
}

/* ── Chat messages area ──────────────────────────────────────────────────── */
.chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #f0f2f5;
}

/* Scrollbar styling */
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-track { background: transparent; }
.chat-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

/* ── Message rows ────────────────────────────────────────────────────────── */
.msg-row {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    max-width: 78%;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.msg-row.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.msg-row.other {
    align-self: flex-start;
}

.msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid #ddd;
}

.bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.msg-row.me .bubble-wrap { align-items: flex-end; }
.msg-row.other .bubble-wrap { align-items: flex-start; }

.msg-username {
    font-size: 11px;
    font-weight: 600;
    color: #c0392b;
    padding: 0 4px;
}

.msg-row.me .msg-username { color: #888; }

.bubble {
    padding: 8px 12px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.45;
    max-width: 100%;
    word-break: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

.msg-row.other .bubble {
    background: #ffffff;
    color: #111;
    border-bottom-left-radius: 4px;
}

.msg-row.me .bubble {
    background: #e74c3c;
    color: #fff;
    border-bottom-right-radius: 4px;
}

.msg-row.me .bubble a { color: #ffe0de; }

/* Media-only bubble — no coloured background */
.bubble.bubble-media {
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 !important;
}

.bubble .chat-upload {
    max-width: 200px;
    height: auto;
    border-radius: 10px;
    display: block;
}

.bubble .chat-sticker {
    width: 120px;
    height: 120px;
}

/* Voice note player */
.bubble audio {
    max-width: 220px;
    height: 36px;
    display: block;
    border-radius: 18px;
}

/* Mic button */
.mic-btn {
    color: #b0b8c1;  /* silver */
    transition: color 0.15s, background 0.15s, transform 0.1s;
}
.mic-btn:hover { color: #888; background: #f0f0f0; }
.mic-btn.recording {
    color: #e74c3c !important;
    animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

.msg-time {
    font-size: 10px;
    color: #aaa;
    padding: 0 4px;
}

/* ── Input bar ───────────────────────────────────────────────────────────── */
.chat-input-bar {
    background: #fff;
    border-top: 1px solid #e0e0e0;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}

#myInput {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 14px;
    outline: none;
    background: #f5f5f5;
    transition: border-color 0.2s, background 0.2s;
}

#myInput:focus {
    border-color: #e74c3c;
    background: #fff;
}

.icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #888;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    padding: 0;
}

.icon-btn:hover { background: #f0f0f0; color: #c0392b; }

.send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #e74c3c;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    padding: 0;
}

.send-btn:hover { background: #c0392b; transform: scale(1.05); }

/* ── Sticker picker ──────────────────────────────────────────────────────── */
.sticker-btn-group {
    position: relative;
}

.sticker-btn-group .dropdown-menu {
    bottom: 48px;
    top: auto;
    left: -60px;
    width: 220px;
    max-height: 220px;
    overflow-y: auto;
    display: none;
    flex-wrap: wrap;
    padding: 8px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    border: 1px solid #eee;
}

.sticker-btn-group .dropdown-menu.show { display: flex; }

.sticker-btn-group .dropdown-item.sticker {
    width: 36px;
    height: 36px;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.sticker-btn-group .dropdown-item.sticker:hover { background: #f5f5f5; }
.sticker-btn-group .dropdown-item.sticker img { width: 26px; height: 26px; }
</style>

<script>
// ── Page init ─────────────────────────────────────────────────────────────────
window.onload = function () {
    var username = localStorage.getItem('myUserName') || '';
    var avatar   = localStorage.getItem('avatarImgData');

    if (!username) {
        window.location.href = 'index.html';
        return;
    }

    document.getElementById('myUserName').textContent = username;
    if (avatar) document.getElementById('avatar').src = avatar;

    // Image upload handler
    document.getElementById('fileInput').onchange = function () {
        var reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('baseimage').value = e.target.result;
            sendFunction();
        };
        reader.readAsDataURL(this.files[0]);
    };

    // Sticker toggle
    document.getElementById('stickerToggle').addEventListener('click', function (e) {
        e.stopPropagation();
        document.getElementById('stickerMenu').classList.toggle('show');
    });

    // Sticker click handler
    $(document).on('click', '.sticker', function (e) {
        e.preventDefault();
        var url = $(this).find('img').attr('src');
        if (url) {
            postToFirebase({ sticker_url: url });
            document.getElementById('stickerMenu').classList.remove('show');
        }
    });

    // Close sticker menu on outside click
    document.addEventListener('click', function () {
        document.getElementById('stickerMenu').classList.remove('show');
    });

    // Enter key sends message
    document.getElementById('myInput').addEventListener('keyup', function (e) {
        if (e.keyCode === 13) sendFunction();
    });

    connectFirebase();
};

// ── Firebase ──────────────────────────────────────────────────────────────────
var initialLoadDone = false;

function connectFirebase() {
    try {
        var db  = firebase.database();
        var ref = db.ref('messages').orderByChild('created_at').limitToLast(50);

        ref.once('value', function (snapshot) {
            var rows = [];
            snapshot.forEach(function (child) { rows.push(child.val()); });
            rows.forEach(appendMessage);
            scrollToBottom();
            setStatus('');
        }, function (err) {
            setStatus('Firebase error — check firebase-config.js');
            console.warn(err.message);
        });

        ref.on('child_added', function (snapshot) {
            if (!initialLoadDone) return;
            appendMessage(snapshot.val());
            scrollToBottom();
        });

        setTimeout(function () { initialLoadDone = true; }, 500);
    } catch (err) {
        setStatus('Firebase not configured — add your keys to firebase-config.js');
        console.warn(err.message);
    }
}

// ── Render a message ──────────────────────────────────────────────────────────
function escapeHtml(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
}

function embedUrls(text) {
    return escapeHtml(text).replace(/(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function formatTime(ts) {
    var d  = new Date(ts);
    var h  = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;
}

function appendMessage(msg) {
    var me      = localStorage.getItem('myUserName') || '';
    var isMe    = msg.username === me;
    var $row    = $('<div>').addClass('msg-row').addClass(isMe ? 'me' : 'other');
    var $wrap   = $('<div class="bubble-wrap">');
    var $bubble = $('<div class="bubble">');
    var isMedia = false;

    // Avatar (only for others)
    if (!isMe && msg.avatar) {
        $row.append($('<img class="msg-avatar">').attr('src', msg.avatar));
    }

    // Username label (only for others)
    if (!isMe) {
        $wrap.append('<div class="msg-username">' + escapeHtml(msg.username) + '</div>');
    }

    // Content
    if (msg.sticker_url) {
        $bubble.append($('<img class="chat-sticker">').attr('src', msg.sticker_url));
        isMedia = true;
    } else if (msg.audio_data) {
        $bubble.append($('<audio controls>').attr('src', msg.audio_data));
        isMedia = true;
    } else {
        if (msg.message) {
            $bubble.append($('<span>').html(embedUrls(msg.message)));
        }
        if (msg.image_data) {
            if (msg.message) $bubble.append('<br>');
            $bubble.append($('<img class="chat-upload">').attr('src', msg.image_data));
            if (!msg.message) isMedia = true;
        }
    }

    // No coloured background for stickers / images / audio
    if (isMedia) $bubble.addClass('bubble-media');

    var ts = msg.created_at ? formatTime(msg.created_at) : '';
    $wrap.append($bubble);
    $wrap.append('<div class="msg-time">' + ts + '</div>');
    $row.append($wrap);
    $('#conDivID').append($row);
}

function scrollToBottom() {
    var box = document.getElementById('conDivID');
    box.scrollTop = box.scrollHeight;
}

function setStatus(text) {
    document.getElementById('dbStatus').textContent = text;
    document.getElementById('dbStatus').style.display = text ? 'block' : 'none';
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendFunction() {
    var message   = document.getElementById('myInput').value.trim();
    var imageData = document.getElementById('baseimage').value;
    if (!message && !imageData) return;

    postToFirebase({ message: message || null, image_data: imageData || null });
    document.getElementById('myInput').value   = '';
    document.getElementById('baseimage').value = '';
    document.getElementById('myInput').focus();
}

function postToFirebase(extra) {
    var username = localStorage.getItem('myUserName') || '';
    var avatar   = localStorage.getItem('avatarImgData') || null;
    if (!username) { window.location.href = 'index.html'; return; }

    playMessageSentSound();

    var payload = Object.assign({
        username:   username,
        avatar:     avatar,
        created_at: firebase.database.ServerValue.TIMESTAMP
    }, extra);

    try {
        firebase.database().ref('messages').push(payload)
            .catch(function (err) { setStatus('Send failed: ' + err.message); });
    } catch (err) {
        setStatus('Firebase not configured — add your keys to firebase-config.js');
    }
}

function clearLocalView() {
    document.getElementById('conDivID').innerHTML = '';
    playClearSound();
}

// ── Voice recording ───────────────────────────────────────────────────────────
var mediaRecorder = null;
var audioChunks   = [];
var isRecording   = false;

function toggleVoiceRecording() {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
}

function startRecording() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('Voice notes are not supported in this browser.');
        return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) {
            audioChunks  = [];
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = function (e) {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = function () {
                var blob   = new Blob(audioChunks, { type: 'audio/webm' });
                var reader = new FileReader();
                reader.onload = function (e) {
                    postToFirebase({ audio_data: e.target.result });
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(function (t) { t.stop(); });
            };

            mediaRecorder.start();
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            setStatus('Recording… tap mic again to send.');
        })
        .catch(function () {
            setStatus('Microphone access denied.');
        });
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    setStatus('');
}

function playMessageSentSound() { document.getElementById('myAudio1').play(); }
function playClearSound()       { document.getElementById('myAudio2').play(); }
</script>
