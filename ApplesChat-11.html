// ─────────────────────────────────────────────────────────────────────────────
// ── Push / In-app Notifications ──────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
(function initNotifications() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
        // Request permission after first user interaction
        document.addEventListener('click', function ask() {
            Notification.requestPermission();
            document.removeEventListener('click', ask);
        }, { once: true });
    }
})();

var _notifTimer = null;
function _showNotification(sender, body, avatar) {
    // In-app banner (always)
    var banner = document.getElementById('notifBanner');
    banner.textContent = '💬 ' + sender + ': ' + (body || '…');
    banner.classList.remove('show');
    void banner.offsetWidth; // reflow to restart animation
    banner.classList.add('show');
    clearTimeout(_notifTimer);
    _notifTimer = setTimeout(function () { banner.classList.remove('show'); }, 4000);

    // OS notification (only when tab is hidden)
    if (document.hidden && Notification.permission === 'granted') {
        var n = new Notification('ApplesChat — ' + sender, {
            body: body || '',
            icon: avatar || 'https://imgur.com/57AweD4.png',
            tag: 'appleschat-msg',
            renotify: true
        });
        n.onclick = function () { window.focus(); n.close(); };
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// ── Block / Unblock ───────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
function _getBlockedList() {
    try { return JSON.parse(localStorage.getItem('blockedUsers') || '[]'); } catch(e) { return []; }
}
function _saveBlockedList(arr) {
    localStorage.setItem('blockedUsers', JSON.stringify(arr));
}
function _isBlocked(username) {
    return _getBlockedList().indexOf(username) !== -1;
}
function _blockUser(username) {
    var list = _getBlockedList();
    if (list.indexOf(username) === -1) { list.push(username); _saveBlockedList(list); }
}
function _unblockUser(username) {
    var list = _getBlockedList().filter(function(u){ return u !== username; });
    _saveBlockedList(list);
}
function _blockFromMsg(username) {
    if (!username) return;
    if (_isBlocked(username)) {
        if (confirm('Unblock ' + username + '?')) { _unblockUser(username); }
        return;
    }
    if (confirm('Block ' + username + '? Their messages will be hidden.')) {
        _blockUser(username);
        // Hide their existing messages in current view
        document.querySelectorAll('.msg-row.other').forEach(function(row) {
            var nameEl = row.querySelector('.badge-name-text');
            if (nameEl && nameEl.textContent === username) row.style.display = 'none';
        });
    }
}

function openBlockedList() {
    var inner = document.getElementById('blockedListInner');
    inner.innerHTML = '';
    var list = _getBlockedList();
    if (list.length === 0) {
        inner.innerHTML = '<div class="blocked-empty">No blocked users</div>';
    } else {
        list.forEach(function(uname) {
            var item = document.createElement('div');
            item.className = 'blocked-item';
            var nameEl = document.createElement('span');
            nameEl.className = 'blocked-item-name';
            nameEl.textContent = uname;
            var btn = document.createElement('button');
            btn.className = 'unblock-btn';
            btn.textContent = 'Unblock';
            btn.onclick = function() {
                _unblockUser(uname);
                // Show their messages again
                document.querySelectorAll('.msg-row.other').forEach(function(row) {
                    var nameEl2 = row.querySelector('.badge-name-text');
                    if (nameEl2 && nameEl2.textContent === uname) row.style.display = '';
                });
                item.remove();
                if (inner.children.length === 0) inner.innerHTML = '<div class="blocked-empty">No blocked users</div>';
            };
            item.appendChild(nameEl);
            item.appendChild(btn);
            inner.appendChild(item);
        });
    }
    document.getElementById('blockedModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}
function closeBlockedList() {
    document.getElementById('blockedModal').classList.remove('show');
    document.body.style.overflow = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// ── Background selector & Dark mode ──────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
var _bgClasses = ['bg-nature','bg-gradient1','bg-gradient2','bg-gradient3','bg-darkbg','bg-white'];

function _applyTheme() {
    var bg = localStorage.getItem('chatBg') || 'default';
    var dark = localStorage.getItem('darkMode') === '1';
    var shell = document.querySelector('.chat-shell');
    // Remove all bg classes
    _bgClasses.forEach(function(c){ shell.classList.remove(c); });
    if (bg !== 'default') shell.classList.add('bg-' + bg);
    // Dark mode on html element for max coverage
    document.documentElement.classList.toggle('dark-mode', dark);
    document.body.classList.toggle('dark-mode', dark);
    // Highlight active swatch
    document.querySelectorAll('.bg-swatch').forEach(function(el){ el.classList.remove('active'); });
    var activeBtn = document.getElementById('bg-btn-' + bg);
    if (activeBtn) activeBtn.classList.add('active');
    // Sync toggle
    var tog = document.getElementById('darkModeToggle');
    if (tog) tog.checked = dark;
}

function setBg(name) {
    localStorage.setItem('chatBg', name);
    _applyTheme();
}
function toggleDarkMode(on) {
    localStorage.setItem('darkMode', on ? '1' : '0');
    _applyTheme();
}

function openSettings() {
    _applyTheme(); // sync UI state
    document.getElementById('settingsModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}
function closeSettings() {
    document.getElementById('settingsModal').classList.remove('show');
    document.body.style.overflow = '';
}

// Apply saved theme on load
_applyTheme();

// ─────────────────────────────────────────────────────────────────────────────
// ── WebRTC Calls (Firebase signaling) ────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
var _pc = null, _localStream = null, _callTimerInterval = null, _callSeconds = 0;
var _activeCallId = null, _callRole = null; // 'caller' | 'callee'
var _callMuted = false, _callVideoOff = false;

var _rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

function initiateCall(targetUser) {
    var me = localStorage.getItem('myUserName') || '';
    if (!me || !targetUser) return;
    var callId = me + '_' + targetUser + '_' + Date.now();
    _activeCallId = callId;
    _callRole = 'caller';

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(function(stream) {
            _localStream = stream;
            document.getElementById('callSelfVideo').srcObject = stream;
            document.getElementById('callActiveName').textContent = '📞 Calling ' + targetUser + '…';
            document.getElementById('callActiveTimer').textContent = '00:00';
            document.getElementById('callActiveOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';

            _pc = new RTCPeerConnection(_rtcConfig);
            stream.getTracks().forEach(function(t){ _pc.addTrack(t, stream); });
            _pc.ontrack = function(e) {
                document.getElementById('callRemoteVideo').srcObject = e.streams[0];
            };
            _pc.onicecandidate = function(e) {
                if (e.candidate) {
                    try { firebase.database().ref('calls/' + callId + '/callerCandidates').push(e.candidate.toJSON()); } catch(err){}
                }
            };

            _pc.createOffer().then(function(offer) {
                return _pc.setLocalDescription(offer);
            }).then(function() {
                var myAvatar = localStorage.getItem('avatarImgData') || 'https://imgur.com/PVBYWRJ.png';
                try {
                    firebase.database().ref('calls/' + callId).set({
                        caller: me, callee: targetUser, status: 'ringing',
                        callerAvatar: myAvatar,
                        offer: { type: _pc.localDescription.type, sdp: _pc.localDescription.sdp }
                    });
                } catch(err){}
                // Listen for answer
                try {
                    firebase.database().ref('calls/' + callId + '/answer').on('value', function(snap) {
                        if (!snap.val() || !_pc) return;
                        var ans = snap.val();
                        if (_pc.signalingState === 'have-local-offer') {
                            _pc.setRemoteDescription(new RTCSessionDescription(ans)).catch(function(){});
                            _startCallTimer();
                            document.getElementById('callActiveName').textContent = '📞 ' + targetUser;
                        }
                    });
                    // ICE from callee
                    firebase.database().ref('calls/' + callId + '/calleeCandidates').on('child_added', function(snap) {
                        if (_pc && snap.val()) _pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(function(){});
                    });
                    // Listen for reject/end
                    firebase.database().ref('calls/' + callId + '/status').on('value', function(snap) {
                        if (snap.val() === 'ended' || snap.val() === 'rejected') endCall();
                    });
                } catch(err){}
            }).catch(function(err){ console.warn('Call offer error:', err); endCall(); });
        })
        .catch(function(err) { alert('Camera/mic access denied. Please allow permissions to make calls.'); });
}

function _listenForIncomingCalls() {
    var me = localStorage.getItem('myUserName') || '';
    if (!me) return;
    try {
        firebase.database().ref('calls').orderByChild('callee').equalTo(me).on('child_added', function(snap) {
            var call = snap.val();
            if (!call || call.status !== 'ringing') return;
            var callId = snap.key;
            if (_activeCallId) return; // Already in a call
            _activeCallId = callId;
            _callRole = 'callee';
            document.getElementById('callIncomingName').textContent = call.caller;
            document.getElementById('callIncomingLabel').textContent = '📞 Incoming call…';
            document.getElementById('callIncomingAvatar').src = call.callerAvatar || 'https://imgur.com/PVBYWRJ.png';
            document.getElementById('callIncomingOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        });
    } catch(e){}
}

function acceptCall() {
    document.getElementById('callIncomingOverlay').classList.remove('show');
    if (!_activeCallId) return;
    var callId = _activeCallId;
    var callerName = document.getElementById('callIncomingName').textContent;

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(function(stream) {
            _localStream = stream;
            document.getElementById('callSelfVideo').srcObject = stream;
            document.getElementById('callActiveName').textContent = '📞 ' + callerName;
            document.getElementById('callActiveTimer').textContent = '00:00';
            document.getElementById('callActiveOverlay').classList.add('show');

            _pc = new RTCPeerConnection(_rtcConfig);
            stream.getTracks().forEach(function(t){ _pc.addTrack(t, stream); });
            _pc.ontrack = function(e) {
                document.getElementById('callRemoteVideo').srcObject = e.streams[0];
            };
            _pc.onicecandidate = function(e) {
                if (e.candidate) {
                    try { firebase.database().ref('calls/' + callId + '/calleeCandidates').push(e.candidate.toJSON()); } catch(err){}
                }
            };
            try {
                firebase.database().ref('calls/' + callId + '/offer').once('value', function(snap) {
                    var offer = snap.val();
                    _pc.setRemoteDescription(new RTCSessionDescription(offer))
                        .then(function() { return _pc.createAnswer(); })
                        .then(function(answer) { return _pc.setLocalDescription(answer); })
                        .then(function() {
                            firebase.database().ref('calls/' + callId).update({
                                answer: { type: _pc.localDescription.type, sdp: _pc.localDescription.sdp },
                                status: 'active'
                            });
                            _startCallTimer();
                            // ICE from caller
                            firebase.database().ref('calls/' + callId + '/callerCandidates').on('child_added', function(s) {
                                if (_pc && s.val()) _pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(function(){});
                            });
                            firebase.database().ref('calls/' + callId + '/status').on('value', function(s) {
                                if (s.val() === 'ended') endCall();
                            });
                        }).catch(function(err){ console.warn('Call answer error:', err); endCall(); });
                });
            } catch(err){ endCall(); }
        })
        .catch(function(err) { rejectCall(); alert('Camera/mic access denied.'); });
}

function rejectCall() {
    document.getElementById('callIncomingOverlay').classList.remove('show');
    document.body.style.overflow = '';
    if (_activeCallId) {
        try { firebase.database().ref('calls/' + _activeCallId).update({ status: 'rejected' }); } catch(e){}
    }
    _activeCallId = null;
    _callRole = null;
}

function endCall() {
    if (_activeCallId) {
        try { firebase.database().ref('calls/' + _activeCallId).update({ status: 'ended' }); } catch(e){}
        try { firebase.database().ref('calls/' + _activeCallId).off(); } catch(e){}
    }
    if (_pc) { _pc.close(); _pc = null; }
    if (_localStream) { _localStream.getTracks().forEach(function(t){ t.stop(); }); _localStream = null; }
    clearInterval(_callTimerInterval); _callTimerInterval = null; _callSeconds = 0;
    _activeCallId = null; _callRole = null; _callMuted = false; _callVideoOff = false;
    document.getElementById('callActiveOverlay').classList.remove('show');
    document.getElementById('callIncomingOverlay').classList.remove('show');
    document.getElementById('callRemoteVideo').srcObject = null;
    document.getElementById('callSelfVideo').srcObject = null;
    document.body.style.overflow = '';
}

function toggleCallMute() {
    _callMuted = !_callMuted;
    if (_localStream) _localStream.getAudioTracks().forEach(function(t){ t.enabled = !_callMuted; });
    var btn = document.getElementById('callMuteBtn');
    btn.textContent = _callMuted ? '🔇' : '🎤';
    btn.classList.toggle('muted', _callMuted);
}
function toggleCallVideo() {
    _callVideoOff = !_callVideoOff;
    if (_localStream) _localStream.getVideoTracks().forEach(function(t){ t.enabled = !_callVideoOff; });
    var btn = document.getElementById('callVideoBtn');
    btn.textContent = _callVideoOff ? '🚫' : '📹';
    btn.classList.toggle('muted', _callVideoOff);
}
function toggleSpeaker() {
    var btn = document.getElementById('callSpeakerBtn');
    btn.classList.toggle('muted');
    btn.textContent = btn.classList.contains('muted') ? '🔈' : '🔊';
}

function _startCallTimer() {
    _callSeconds = 0;
    clearInterval(_callTimerInterval);
    _callTimerInterval = setInterval(function() {
        _callSeconds++;
        var m = Math.floor(_callSeconds / 60), s = _callSeconds % 60;
        document.getElementById('callActiveTimer').textContent =
            (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
}

// Patch ESC key to also close overlays
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeSettings(); closeBlockedList(); endCall(); }
});

function stopGoLive() {
    if (_liveInterval) { clearInterval(_liveInterval); _liveInterval = null; }
    if (_liveStream) { _liveStream.getTracks().forEach(function (t) { t.stop(); }); _liveStream = null; }
    document.getElementById('liveVideo').srcObject = null;
    document.getElementById('goliveOverlay').classList.remove('show');
    var username = localStorage.getItem('myUserName') || '';
    try {
        firebase.database().ref('users/' + username).update({ isLive: false, liveFrame: null });
    } catch(e) {}
}
