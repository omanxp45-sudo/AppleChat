<script>
// ── Page init ─────────────────────────────────────────────────────────────────
window.onload = function () {
    var username = localStorage.getItem('myUserName') || '';
    var status   = localStorage.getItem('status')     || '';
    var avatar   = localStorage.getItem('avatarImgData');

    if (!username) {
        window.location.href = 'index.html';
        return;
    }

    document.getElementById('myUserName').value = username;
    document.getElementById('status').value     = status;
    if (avatar) document.getElementById('avatar').src = avatar;

    // Image upload handler
    document.getElementById('fileInput').onchange = function () {
        var reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('baseimage').value = e.target.result;
            sendFunction();
        };
        reader.readAsDataURL(this.files[0]);
    };

    // Sticker click handler
    $(document).on('click', '.dropdown-menu .sticker', function (e) {
        e.preventDefault();
        var url = $(this).find('img').attr('src');
        if (url) postToFirebase({ sticker_url: url });
    });

    // Enter key sends message
    document.getElementById('myInput').addEventListener('keyup', function (e) {
        if (e.keyCode === 13) sendFunction();
    });

    // Connect to Firebase and listen for messages in real time
    connectFirebase();
};

// ── Firebase real-time listener ───────────────────────────────────────────────
function connectFirebase() {
    var db  = firebase.database();
    // Load last 50 messages, then listen for every new one
    var ref = db.ref('messages').orderByChild('created_at').limitToLast(50);

    ref.once('value', function (snapshot) {
        // Initial batch — render in chronological order
        var rows = [];
        snapshot.forEach(function (child) { rows.push(child.val()); });
        rows.forEach(appendMessage);
        scrollToBottom();
        setStatus('');
    }, function (err) {
        setStatus('Firebase error: ' + err.message + ' — check firebase-config.js');
    });

    // New messages arriving after initial load
    ref.on('child_added', function (snapshot) {
        // Skip messages already rendered by the initial once() call
        if (!initialLoadDone) return;
        appendMessage(snapshot.val());
        scrollToBottom();
    });

    // Mark initial load complete after a tick
    setTimeout(function () { initialLoadDone = true; }, 500);
}

var initialLoadDone = false;

// ── Render one message ────────────────────────────────────────────────────────
function escapeHtml(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
}

function embedUrls(text) {
    var safe = escapeHtml(text);
    return safe.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
}

function formatTime(ts) {
    var d = new Date(ts);
    var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + pad(m) + ':' + pad(s) + ' ' + ap;
}
function pad(n) { return n < 10 ? '0' + n : n; }

function appendMessage(msg) {
    var $row = $('<div class="msg-row">');

    if (msg.avatar) {
        $row.append($('<img class="msg-avatar">').attr('src', msg.avatar));
        $row.append(' ');
    }

    $row.append('<span style="color:red;">' + escapeHtml(msg.username) + ': </span>');

    if (msg.sticker_url) {
        $row.append($('<img class="chat-sticker">').attr('src', msg.sticker_url));
    } else {
        if (msg.message) {
            $row.append($('<span>').html(embedUrls(msg.message)));
        }
        if (msg.image_data) {
            $row.append('<br>');
            $row.append($('<img class="chat-upload">').attr('src', msg.image_data));
        }
    }

    var ts = msg.created_at ? formatTime(msg.created_at) : '';
    $row.append('<br><span class="timeSpan">' + ts + '</span>');

    $('#conDivID').append($row);
}

function scrollToBottom() {
    var box = document.getElementById('conDivID');
    box.scrollTop = box.scrollHeight;
}

function setStatus(text) {
    document.getElementById('dbStatus').textContent = text;
}

// ── Send a text message or image ──────────────────────────────────────────────
function sendFunction() {
    var message   = document.getElementById('myInput').value.trim();
    var imageData = document.getElementById('baseimage').value;

    if (!message && !imageData) return;

    postToFirebase({
        message:    message    || null,
        image_data: imageData  || null
    });

    document.getElementById('myInput').value   = '';
    document.getElementById('baseimage').value = '';
    document.getElementById('myInput').focus();
}

// ── Write any message type to Firebase ───────────────────────────────────────
function postToFirebase(extra) {
    var username = localStorage.getItem('myUserName') || '';
    var avatar   = localStorage.getItem('avatarImgData') || null;

    if (!username) {
        window.location.href = 'index.html';
        return;
    }

    playMessageSentSound();

    var payload = Object.assign({
        username:   username,
        avatar:     avatar,
        created_at: firebase.database.ServerValue.TIMESTAMP
    }, extra);

    firebase.database().ref('messages').push(payload)
        .catch(function (err) {
            setStatus('Send failed: ' + err.message);
        });
}

// ── Clear local view (messages stay in Firebase) ─────────────────────────────
function clearLocalView() {
    document.getElementById('conDivID').innerHTML = '';
    playClearSound();
}

// ── Sounds ────────────────────────────────────────────────────────────────────
function playMessageSentSound() { document.getElementById('myAudio1').play(); }
function playClearSound()       { document.getElementById('myAudio2').play(); }
</script>
