<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon background -->
  <rect width="512" height="512" rx="90" fill="#b03025"/>

  <!-- Apple body -->
  <path fill="#fff"
    d="M 326 204
       C 310 204 296 212 283 212
       C 270 212 254 204 236 204
       C 196 204 160 238 160 290
       C 160 358 210 420 248 420
       C 260 420 270 414 283 414
       C 296 414 306 420 322 420
       C 362 420 406 356 406 290
       C 406 238 368 204 326 204 Z"/>

  <!-- Left lobe of apple top -->
  <ellipse cx="232" cy="196" rx="42" ry="38" fill="#fff"/>

  <!-- Right lobe of apple top -->
  <ellipse cx="334" cy="196" rx="42" ry="38" fill="#fff"/>

  <!-- Center dip between lobes (background colour) -->
  <ellipse cx="283" cy="198" rx="22" ry="14" fill="#b03025"/>

  <!-- Shine highlight -->
  <ellipse cx="218" cy="258" rx="22" ry="32"
           fill="rgba(255,255,255,0.22)"
           transform="rotate(-20 218 258)"/>

  <!-- Stem -->
  <rect x="272" y="118" width="18" height="58" rx="9" fill="#5d4037"/>

  <!-- Leaf -->
  <ellipse cx="316" cy="132" rx="42" ry="16"
           fill="#27ae60"
           transform="rotate(-35 316 132)"/>
  <ellipse cx="316" cy="132" rx="30" ry="10"
           fill="#2ecc71"
           transform="rotate(-35 316 132)"/>
</svg>
