<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ApplesChat — Private Chat</title>
<link rel="icon" href="57AweD4.png" sizes="any">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #c9d6ff 0%, #e2e2e2 50%, #fbc2eb 100%) fixed;
    overscroll-behavior: none;
}
@supports (height: 100dvh) { html, body { height: 100dvh; } }

/* ── Shell ── */
.pm-shell {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 600px; margin: 0 auto;
    background: rgba(229,221,213,0.45);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    box-shadow: 0 0 24px rgba(0,0,0,0.18);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}
@supports (height: 100dvh) { .pm-shell { height: 100dvh; } }

/* ── Header ── */
.pm-header {
    background: linear-gradient(135deg, #b03025, #e74c3c);
    color: #fff; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 20; min-height: 58px;
}
.pm-back-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 20px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s; text-decoration: none;
}
.pm-back-btn:active { background: rgba(255,255,255,0.38); }
.pm-header-avatar {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(255,255,255,0.5); flex-shrink: 0;
}
.pm-header-info { flex: 1; min-width: 0; }
.pm-header-name {
    font-size: 16px; font-weight: 700; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pm-header-status {
    font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1;
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
}
.pm-header-status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71; display: inline-block;
    box-shadow: 0 0 0 2px rgba(46,204,113,0.3);
}
.pm-header-status-dot.offline { background: #aaa; box-shadow: none; }
.pm-header-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 18px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
}
.pm-header-btn:active { background: rgba(255,255,255,0.38); }

/* ── Messages ── */
.pm-body {
    flex: 1; overflow-y: auto; padding: 10px 10px 4px;
    display: flex; flex-direction: column; gap: 3px;
    -webkit-overflow-scrolling: touch;
}
.pm-body::-webkit-scrollbar { width: 3px; }
.pm-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

.pm-row {
    display: flex; align-items: flex-end; gap: 6px;
    max-width: 82%; animation: fadeIn 0.18s ease;
}
.pm-row.me    { align-self: flex-end;   flex-direction: row-reverse; }
.pm-row.other { align-self: flex-start; }

.pm-bubble {
    position: relative; padding: 8px 12px 20px;
    border-radius: 16px; font-size: 16px; line-height: 1.45;
    max-width: 100%; word-break: break-word;
}
.pm-row.other .pm-bubble {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 4px 18px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
    color: #111; border-bottom-left-radius: 3px;
}
.pm-row.other .pm-bubble::before {
    content: ''; position: absolute; bottom: 0; left: -7px;
    border-top: 8px solid transparent;
    border-right: 8px solid rgba(255,255,255,0.5);
}
.pm-row.me .pm-bubble {
    background: rgba(180,240,190,0.5);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(180,240,190,0.75);
    box-shadow: 0 4px 18px rgba(37,211,102,0.15), inset 0 1px 0 rgba(255,255,255,0.55);
    color: #0d2b14; border-bottom-right-radius: 3px;
}
.pm-row.me .pm-bubble::after {
    content: ''; position: absolute; bottom: 0; right: -7px;
    border-top: 8px solid transparent;
    border-left: 8px solid rgba(180,240,190,0.5);
}
.pm-row.me .pm-bubble a { color: #1a7c3c; }
.pm-bubble.media-bubble {
    background: transparent !important;
    box-shadow: none !important; padding: 0 !important;
}
.pm-bubble.media-bubble::before,
.pm-bubble.media-bubble::after { display: none; }
.pm-bubble-ts {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 10px; color: #999; white-space: nowrap; pointer-events: none;
}
.pm-bubble img.chat-upload {
    max-width: 220px; height: auto; border-radius: 12px;
    display: block; cursor: pointer;
}
.pm-bubble img.chat-sticker { width: 120px; height: 120px; display: block; }
.pm-bubble audio { max-width: 220px; height: 38px; display: block; border-radius: 18px; }
.msg-time { font-size: 10px; color: #aaa; padding: 0 4px; }

.pm-empty {
    text-align: center; color: rgba(0,0,0,0.3); font-size: 14px;
    margin: auto; padding: 30px 20px; line-height: 1.8;
}

/* ── Action tray ── */
.action-tray {
    background: rgba(255,255,255,0.42);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(255,255,255,0.5);
    display: flex; gap: 6px; padding: 0 12px;
    flex-shrink: 0; 
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    max-height: 0; transition: max-height 0.22s ease, padding 0.22s ease;
}
.action-tray::-webkit-scrollbar {
    height: 3px;
}
.action-tray::-webkit-scrollbar-thumb {
    background: rgba(200,200,200,0.5);
    border-radius: 3px;
}
.action-tray.open { max-height: 90px; padding: 10px 12px; overflow-x: auto; }
.tray-btn {
    flex: 0 0 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 14px;
    background: rgba(255,255,255,0.38);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    cursor: pointer; font-size: 11px; color: #333; font-weight: 500;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.6);
}
.tray-btn:active { background: rgba(255,255,255,0.6); }
.tray-icon { font-size: 22px; line-height: 1; }
.tray-sticker-wrap { flex: 0 0 auto; }
.tray-sticker-wrap .tray-btn { min-width: auto; }

/* Sticker dropdown */
.sticker-dropdown {
    position: fixed;
    left: 50%;
    bottom: 90px;
    transform: translateX(-50%);
    width: min(92vw, 320px); max-height: 240px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: none; flex-wrap: wrap; padding: 8px;
    border-radius: 14px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 8px 28px rgba(0,0,0,0.14);
    z-index: 9999;
}
.sticker-dropdown.show { display: flex; }
.sticker-item {
    width: 40px; height: 40px; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; border: none; background: none;
}
.sticker-item:hover, .sticker-item:active { background: rgba(0,0,0,0.07); }
.sticker-item img { width: 28px; height: 28px; }

/* ── Input bar ── */
.pm-input-bar {
    background: rgba(240,240,240,0.5);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.5);
    padding: 8px 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    display: flex; align-items: center; gap: 7px; flex-shrink: 0;
}
.plus-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #444; flex-shrink: 0;
    transition: background 0.12s, transform 0.2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
}
.plus-btn.open { transform: rotate(45deg); }
.plus-btn:active { background: rgba(255,255,255,0.6); }
#pmInput {
    flex: 1; border: none; border-radius: 22px; padding: 10px 16px;
    font-size: 16px; outline: none; resize: none; max-height: 120px;
    line-height: 1.4; touch-action: manipulation;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    color: #111; transition: box-shadow 0.2s;
}
#pmInput:focus {
    background: rgba(255,255,255,0.68);
    border-color: rgba(231,76,60,0.4);
    box-shadow: 0 2px 12px rgba(231,76,60,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
}
.mic-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: rgba(13,110,253,0.72);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(100,160,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.12s, transform 0.1s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0;
    box-shadow: 0 4px 14px rgba(13,110,253,0.35), inset 0 1px 0 rgba(180,210,255,0.4);
}
.mic-btn:active { transform: scale(0.93); }
.mic-btn.recording { background: rgba(10,88,202,1) !important; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.1);} }
.send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #3355ff 0%, #0022ff 100%) !important;
    border: 1px solid rgba(120,140,255,0.55) !important;
    color: #fff; display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0;
    box-shadow: 0 0 20px rgba(0,34,255,0.8), 0 3px 12px rgba(0,34,255,0.55), inset 0 1px 0 rgba(160,180,255,0.5) !important;
    transition: transform 0.1s, box-shadow 0.12s;
}
.send-btn:active { transform: scale(0.93) !important; }

/* ── Dark mode ── */
html.dark-mode, body.dark-mode {
    background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%) fixed !important;
}
.dark-mode .pm-shell { background: rgba(15,15,25,0.65) !important; }
.dark-mode .pm-row.other .pm-bubble { background: rgba(38,38,55,0.72) !important; border-color: rgba(255,255,255,0.10) !important; color: #e2e2e2 !important; }
.dark-mode .pm-row.other .pm-bubble::before { border-right-color: rgba(38,38,55,0.72) !important; }
.dark-mode .pm-row.me .pm-bubble { background: rgba(18,72,45,0.68) !important; border-color: rgba(70,190,110,0.32) !important; color: #c8efd4 !important; }
.dark-mode .pm-row.me .pm-bubble::after { border-left-color: rgba(18,72,45,0.68) !important; }
.dark-mode .pm-bubble-ts { color: rgba(255,255,255,0.4); }
.dark-mode .pm-input-bar { background: rgba(12,12,22,0.68) !important; border-top-color: rgba(255,255,255,0.08) !important; }
.dark-mode #pmInput { background: rgba(28,28,45,0.75) !important; border-color: rgba(255,255,255,0.12) !important; color: #e2e2e2 !important; }
.dark-mode #pmInput::placeholder { color: rgba(255,255,255,0.3); }
.dark-mode .plus-btn { background: rgba(35,35,55,0.65) !important; border-color: rgba(255,255,255,0.15) !important; color: #ccc !important; }
.dark-mode .action-tray { background: rgba(12,12,22,0.68) !important; border-top-color: rgba(255,255,255,0.08) !important; }
.dark-mode .tray-btn { background: rgba(35,35,58,0.6) !important; border-color: rgba(255,255,255,0.12) !important; color: #ccc !important; }
.dark-mode .sticker-dropdown { background: rgba(25,25,42,0.9) !important; border-color: rgba(255,255,255,0.1) !important; }
.dark-mode .pm-empty { color: rgba(255,255,255,0.3); }

/* ── Lightbox ── */
.lightbox-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 9999;
    align-items: center; justify-content: center;
}
.lightbox-overlay.show { display: flex; }
.lightbox-overlay img { max-width: 96vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
.lightbox-close {
    position: fixed; top: 14px; right: 18px;
    font-size: 36px; color: #fff; cursor: pointer; z-index: 10001;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6); user-select: none;
}
</style>
</head>

                <button class="sticker-item" onclick="sendSticker('https://i.imgur.com/aFCkpNZ.png')"><img src="https://i.imgur.com/aFCkpNZ.png" alt=""></button>
                <button class="sticker-item" onclick="sendSticker('https://i.imgur.com/RV84irI.png')"><img src="https://i.imgur.com/RV84irI.png" alt=""></button>
                <button class="sticker-item" onclick="sendSticker('https://i.imgur.com/OWGw5bW.png')"><img src="https://i.imgur.com/OWGw5bW.png" alt=""></button>
            </div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="pm-input-bar">
        <button class="plus-btn" id="plusBtn" onclick="toggleTray(event)" title="More">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
        <textarea id="pmInput" placeholder="Message…" rows="1"
            oninput="autoResize(this); updateSendMic();"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice note">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none">
                <rect x="8.5" y="2" width="7" height="13" rx="3.5" fill="#fff"/>
                <path d="M5 11a7 7 0 0 0 14 0" stroke="#fff" stroke-width="2.2" stroke-linecap="round" fill="none"/>
                <line x1="12" y1="18" x2="12" y2="22" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="8" y1="22" x2="16" y2="22" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </button>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="Send">&#9658;</button>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&#215;</span>
    <img id="lightboxImg" src="" alt="">
</div>

<!-- Hidden inputs -->
<input type="file" id="pmFileInput" accept="image/*,video/*" multiple style="display:none;">
<input type="file" id="pmCameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="pmDocInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip" style="display:none;">
<input type="file" id="pmAudioInput" accept="audio/*" style="display:none;">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// ── Init ──────────────────────────────────────────────────────────────────────
var params  = new URLSearchParams(window.location.search);
var PEER    = params.get('peer')    || '';
var AVATAR  = params.get('avatar')  || 'https://i.imgur.com/PVBYWRJ.png';
var STATUS  = params.get('status')  || 'Online';
var ME      = localStorage.getItem('myUserName') || '';
var CHAT_ID = [ME, PEER].sort().join('__pm__');

var _loadedIds = new Set();
var _recording = false, _mediaRecorder = null, _audioChunks = [];

window.onload = function () {
    if (!ME)   { window.location.href = 'index.html'; return; }
    if (!PEER) { document.getElementById('pmEmpty').textContent = 'No user specified.'; return; }

    // Portal sticker menu to <body> so it escapes overflow:hidden/auto on the tray
    document.body.appendChild(document.getElementById('stickerMenu'));

    // Apply saved theme
    if (localStorage.getItem('darkMode') === '1') {
        document.documentElement.classList.add('dark-mode');
        document.body.classList.add('dark-mode');
    }

    // Header
    document.getElementById('pmHeaderName').textContent   = PEER;
    document.getElementById('pmHeaderAvatar').src         = decodeURIComponent(AVATAR);
    document.getElementById('pmStatusText').textContent   = STATUS;
    document.title = 'Chat with ' + PEER + ' — ApplesChat';

    // File input
    document.getElementById('pmFileInput').onchange = function () {
        var files = this.files;
        if (!files.length) return;
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var reader = new FileReader();
            (function(f) {
                reader.onload = function (e) {
                    if (f.type.startsWith('video/')) {
                        sendMsg({ video_data: e.target.result, video_name: f.name });
                    } else {
                        var img = new Image();
                        img.onload = function () {
                            var canvas = document.createElement('canvas');
                            var max = 800, scale = Math.min(1, max / Math.max(img.width, img.height));
                            canvas.width  = Math.round(img.width  * scale);
                            canvas.height = Math.round(img.height * scale);
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            sendMsg({ image_data: canvas.toDataURL('image/jpeg', 0.75) });
                        };
                        img.src = e.target.result;
                    }
                };
            })(file);
            reader.readAsDataURL(file);
        }
        this.value = '';
    };

    document.getElementById('pmCameraInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            var img = new Image();
            img.onload = function () {
                var canvas = document.createElement('canvas');
                var max = 800, scale = Math.min(1, max / Math.max(img.width, img.height));
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                sendMsg({ image_data: canvas.toDataURL('image/jpeg', 0.75) });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    document.getElementById('pmDocInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            sendMsg({ doc_data: e.target.result, doc_name: file.name, doc_size: file.size });
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    document.getElementById('pmAudioInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            sendMsg({ audio_file_data: e.target.result, audio_file_name: file.name });
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    // Outside click closes tray
    document.addEventListener('click', function (e) {
        if (!document.getElementById('plusBtn').contains(e.target) &&
            !document.getElementById('actionTray').contains(e.target)) {
            document.getElementById('stickerMenu').classList.remove('show');
            closeTray();
        }
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
    });

    loadMessages();
    listenOnlineStatus();
};

// ── Firebase ──────────────────────────────────────────────────────────────────
function loadMessages() {
    try {
        var ref = firebase.database()
            .ref('private_messages/' + CHAT_ID)
            .orderByChild('created_at').limitToLast(80);

        ref.once('value', function (snap) {
            var body = document.getElementById('pmBody');
            body.innerHTML = '';
            var rows = [];
            snap.forEach(function (c) { rows.push({ key: c.key, val: c.val() }); });
            if (rows.length === 0) {
                body.innerHTML = '<div class="pm-empty">No messages yet.<br>Say hi! 👋</div>';
            } else {
                rows.forEach(function (r) { _loadedIds.add(r.key); appendMsg(r.val); });
                scrollBottom();
            }
        });

        ref.on('child_added', function (snap) {
            if (_loadedIds.has(snap.key)) return;
            _loadedIds.add(snap.key);
            var empty = document.getElementById('pmEmpty');
            if (empty) empty.remove();
            appendMsg(snap.val());
            scrollBottom();
        });
    } catch (e) { console.warn(e); }
}

function listenOnlineStatus() {
    try {
        firebase.database().ref('users/' + PEER).on('value', function (snap) {
            var u = snap.val();
            var now = Date.now(), threshold = 3 * 60 * 1000;
            var online = u && u.lastSeen && (now - u.lastSeen < threshold);
            var dot = document.getElementById('pmStatusDot');
            dot.className = 'pm-header-status-dot' + (online ? '' : ' offline');
            document.getElementById('pmStatusText').textContent =
                online ? (u.status || 'Online') : 'Offline';
            if (u && u.avatar) document.getElementById('pmHeaderAvatar').src = u.avatar;
        });
    } catch (e) {}
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendMsg(extra) {
    var input = document.getElementById('pmInput');
    var text  = input.value.trim();
    extra = extra || {};
    if (!text && !extra.image_data && !extra.audio_data && !extra.sticker_url && !extra.doc_data && !extra.audio_file_data && !extra.contact_name && !extra.event_title && !extra.poll_question && !extra.video_data) return;
    var myAvatar = localStorage.getItem('avatarImgData') || 'https://i.imgur.com/PVBYWRJ.png';
    var myStatus = localStorage.getItem('status') || '';
    input.value = ''; input.style.height = 'auto'; updateSendMic();
    var payload = Object.assign({
        from: ME, to: PEER,
        message: text || null,
        avatar: myAvatar, status: myStatus,
        created_at: firebase.database.ServerValue.TIMESTAMP
    }, extra);
    try { firebase.database().ref('private_messages/' + CHAT_ID).push(payload); }
    catch (e) { console.warn(e); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function appendMsg(msg) {
    var isMe = msg.from === ME;
    var body = document.getElementById('pmBody');
    var row  = document.createElement('div');
    row.className = 'pm-row ' + (isMe ? 'me' : 'other');
    var bubble = document.createElement('div');
    bubble.className = 'pm-bubble';
    var isMedia = false;

    if (msg.sticker_url) {
        var si = document.createElement('img');
        si.className = 'chat-sticker'; si.src = msg.sticker_url;
        bubble.appendChild(si); isMedia = true;
    } else if (msg.audio_data) {
        var au = document.createElement('audio');
        au.controls = true; au.src = msg.audio_data;
        bubble.appendChild(au); isMedia = true;
    } else if (msg.audio_file_data) {
        var au = document.createElement('audio');
        au.controls = true; au.src = msg.audio_file_data;
        bubble.appendChild(au); isMedia = true;
    } else if (msg.video_data) {
        var vid = document.createElement('video');
        vid.controls = true; vid.src = msg.video_data;
        vid.style.maxWidth = '220px';
        vid.style.borderRadius = '12px';
        bubble.appendChild(vid); isMedia = true;
    } else if (msg.poll_question) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '8px';
        title.textContent = msg.poll_question;
        bubble.appendChild(title);
        var options = [];
        try { options = JSON.parse(msg.poll_options || '[]'); } catch (e) {}
        options.forEach(function (opt) {
            var item = document.createElement('div');
            item.style.padding = '8px 10px';
            item.style.borderRadius = '12px';
            item.style.background = 'rgba(255,255,255,0.8)';
            item.style.marginBottom = '6px';
            item.style.color = '#222';
            item.textContent = opt;
            bubble.appendChild(item);
        });
        isMedia = true;
    } else if (msg.event_title) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '6px';
        title.textContent = msg.event_title;
        bubble.appendChild(title);
        if (msg.event_date) {
            var dateLine = document.createElement('div');
            dateLine.textContent = 'Date: ' + msg.event_date + (msg.event_time ? ' ' + msg.event_time : '');
            bubble.appendChild(dateLine);
        }
        if (msg.event_location) {
            var loc = document.createElement('div');
            loc.textContent = 'Location: ' + msg.event_location;
            bubble.appendChild(loc);
        }
        isMedia = true;
    } else if (msg.doc_data) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '8px';
        title.textContent = msg.doc_name || 'Document';
        bubble.appendChild(title);
        var link = document.createElement('a');
        link.href = msg.doc_data;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = '📂 Open';
        link.style.display = 'inline-block';
        link.style.padding = '10px 14px';
        link.style.borderRadius = '12px';
        link.style.background = '#f0f0f0';
        link.style.color = '#111';
        link.style.textDecoration = 'none';
        bubble.appendChild(link);
        if (msg.doc_size) {
            var size = document.createElement('div');
            size.style.fontSize = '12px';
            size.style.color = '#666';
            size.style.marginTop = '6px';
            size.textContent = Math.round(msg.doc_size / 1024) + ' KB';
            bubble.appendChild(size);
        }
        isMedia = true;
    } else if (msg.contact_name) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '6px';
        title.textContent = msg.contact_name;
        bubble.appendChild(title);
        if (msg.contact_phone) {
            var phone = document.createElement('div');
            phone.textContent = 'Phone: ' + msg.contact_phone;
            bubble.appendChild(phone);
        }
        if (msg.contact_email) {
            var email = document.createElement('div');
            email.textContent = 'Email: ' + msg.contact_email;
            bubble.appendChild(email);
        }
        isMedia = true;
    } else {
        if (msg.message) {
            var sp = document.createElement('span');
            sp.innerHTML = embedUrls(msg.message);
            bubble.appendChild(sp);
        }
        if (msg.image_data) {
            if (msg.message) bubble.appendChild(document.createElement('br'));
            var im = document.createElement('img');
            im.className = 'chat-upload'; im.src = msg.image_data;
            im.onclick = function () { openLightbox(msg.image_data); };
            bubble.appendChild(im);
            if (!msg.message) isMedia = true;
        }
    }

    if (isMedia) bubble.classList.add('media-bubble');

    if (msg.created_at && !isMedia) {
        var ts = document.createElement('span');
        ts.className = 'pm-bubble-ts';
        ts.textContent = formatTime(msg.created_at);
        bubble.appendChild(ts);
    }
    row.appendChild(bubble);
    if (isMedia && msg.created_at) {
        var td = document.createElement('div');
        td.className = 'msg-time'; td.textContent = formatTime(msg.created_at);
        row.appendChild(td);
    }
    body.appendChild(row);
}

function embedUrls(text) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(text || ''));
    return d.innerHTML.replace(/(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function formatTime(ts) {
    var d = new Date(ts), h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;
}

function scrollBottom() {
    var b = document.getElementById('pmBody'); b.scrollTop = b.scrollHeight;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendMic() {
    var has = document.getElementById('pmInput').value.trim().length > 0;
    document.getElementById('micBtn').style.display  = has ? 'none' : 'flex';
    document.getElementById('sendBtn').style.display = has ? 'flex' : 'none';
}

function toggleTray(e) {
    e.stopPropagation();
    var tray = document.getElementById('actionTray');
    var open = tray.classList.toggle('open');
    document.getElementById('plusBtn').classList.toggle('open', open);
    if (!open) document.getElementById('stickerMenu').classList.remove('show');
}

function closeTray() {
    document.getElementById('actionTray').classList.remove('open');
    document.getElementById('plusBtn').classList.remove('open');
    document.getElementById('stickerMenu').classList.remove('show');
}

function toggleStickers(e) {
    e.stopPropagation();
    document.getElementById('stickerMenu').classList.toggle('show');
}

function sendSticker(url) {
    sendMsg({ sticker_url: url }); closeTray();
}

function openCamera() {
    document.getElementById('pmCameraInput').click();
}

function openPollModal() {
    var question = prompt('Poll question:');
    if (!question) return;
    var options = prompt('Enter poll options separated by commas:');
    if (!options) return;
    var list = options.split(',').map(function (item) { return item.trim(); }).filter(Boolean);
    if (list.length < 2) { alert('Add at least 2 options.'); return; }
    sendMsg({ poll_id: 'poll_' + Date.now(), poll_question: question, poll_options: JSON.stringify(list) });
}

function openEventModal() {
    var title = prompt('Event title:');
    if (!title) return;
    var date = prompt('Event date (YYYY-MM-DD):');
    if (!date) return;
    var time = prompt('Event time (HH:MM):');
    var location = prompt('Location (optional):');
    sendMsg({ event_title: title, event_date: date, event_time: time || '', event_location: location || '' });
}

function openContactModal() {
    var name = prompt('Contact name:');
    if (!name) return;
    var phone = prompt('Phone number:');
    if (!phone) return;
    var email = prompt('Email (optional):');
    sendMsg({ contact_name: name, contact_phone: phone, contact_email: email || '' });
}

// ── Voice ─────────────────────────────────────────────────────────────────────
function toggleVoice() {
    _recording ? stopRecording() : startRecording();
}

function startRecording() {
    if (!navigator.mediaDevices) { alert('Mic not supported'); return; }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        _audioChunks = [];
        _mediaRecorder = new MediaRecorder(stream);
        _mediaRecorder.ondataavailable = function (e) { if (e.data.size > 0) _audioChunks.push(e.data); };
        _mediaRecorder.onstop = function () {
            var blob = new Blob(_audioChunks, { type: 'audio/webm' });
            var reader = new FileReader();
            reader.onload = function (ev) { sendMsg({ audio_data: ev.target.result }); };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(function (t) { t.stop(); });
        };
        _mediaRecorder.start();
        _recording = true;
        document.getElementById('micBtn').classList.add('recording');
    }).catch(function () { alert('Mic access denied'); });
}

function stopRecording() {
    if (_mediaRecorder) _mediaRecorder.stop();
    _recording = false;
    document.getElementById('micBtn').classList.remove('recording');
}

// ── Call ──────────────────────────────────────────────────────────────────────
function initiateCall() {
    // Open main chat to handle call (WebRTC signaling handled there)
    if (window.opener && !window.opener.closed) {
        window.opener.initiateCall(PEER);
    } else {
        alert('Open the main chat to make calls.');
    }
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxOverlay').classList.add('show');
}
function closeLightbox() {
    document.getElementById('lightboxOverlay').classList.remove('show');
}
</script>
</body>
</html>
