<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ApplesChat — Private Chat</title>
<link rel="icon" href="57AweD4.png" sizes="any">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #e5ddd5;
    overscroll-behavior: none;
}
@supports (height: 100dvh) { html, body { height: 100dvh; } }

/* ── Shell ── */
.pm-shell {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 600px; margin: 0 auto;
    background: #e5ddd5;
    box-shadow: 0 0 24px rgba(0,0,0,0.18);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}
@supports (height: 100dvh) { .pm-shell { height: 100dvh; } }

/* ── Header ── */
.pm-header {
    background: linear-gradient(135deg, #b03025, #e74c3c);
    color: #fff; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 20; min-height: 58px;
}
.pm-back-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 20px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s; text-decoration: none;
}
.pm-back-btn:active { background: rgba(255,255,255,0.38); }
.pm-header-avatar {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(255,255,255,0.5); flex-shrink: 0;
}
.pm-header-info { flex: 1; min-width: 0; }
.pm-header-name {
    font-size: 16px; font-weight: 700; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pm-header-status {
    font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1;
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
}
.pm-header-status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71; display: inline-block;
    box-shadow: 0 0 0 2px rgba(46,204,113,0.3);
}
.pm-header-status-dot.offline { background: #aaa; box-shadow: none; }
.pm-header-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 18px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
}
.pm-header-btn:active { background: rgba(255,255,255,0.38); }

/* ── Messages ── */
.pm-body {
    flex: 1; overflow-y: auto; padding: 10px 10px 4px;
    display: flex; flex-direction: column; gap: 3px;
    -webkit-overflow-scrolling: touch;
}
.pm-body::-webkit-scrollbar { width: 3px; }
.pm-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

.pm-row {
    display: flex; align-items: flex-end; gap: 6px;
    max-width: 82%; animation: fadeIn 0.18s ease;
}
.pm-row.me    { align-self: flex-end;   flex-direction: row-reverse; }
.pm-row.other { align-self: flex-start; }

.pm-bubble {
    position: relative; padding: 8px 12px 8px;
    border-radius: 16px; font-size: 16px; line-height: 1.45;
    max-width: 100%; word-break: break-word;
}
.pm-row.other .pm-bubble {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 4px 18px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
    color: #111; border-bottom-left-radius: 3px;
}
.pm-row.other .pm-bubble::before {
    content: ''; position: absolute; bottom: 0; left: -7px;
    border-top: 8px solid transparent;
    border-right: 8px solid rgba(255,255,255,0.5);
}
.pm-row.me .pm-bubble {
    background: rgba(180,240,190,0.5);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(180,240,190,0.75);
    box-shadow: 0 4px 18px rgba(37,211,102,0.15), inset 0 1px 0 rgba(255,255,255,0.55);
    color: #0d2b14; border-bottom-right-radius: 3px;
}
.pm-row.me .pm-bubble::after {
    content: ''; position: absolute; bottom: 0; right: -7px;
    border-top: 8px solid transparent;
    border-left: 8px solid rgba(180,240,190,0.5);
}
.pm-row.me .pm-bubble a { color: #1a7c3c; }
.pm-bubble.media-bubble {
    background: transparent !important;
    box-shadow: none !important; padding: 0 !important;
    position: relative;
}
.pm-bubble.media-bubble::before,
.pm-bubble.media-bubble::after { display: none; }
.pm-bubble-ts {
    display: block; text-align: right; margin-top: 4px;
    font-size: 10px; color: #999; white-space: nowrap; pointer-events: none;
}
/* Visual media (image-only, video, sticker): overlay timestamp with dark pill */
.pm-bubble.visual-media .pm-bubble-ts {
    position: absolute; bottom: 6px; right: 8px;
    background: rgba(0,0,0,0.42);
    color: #fff !important;
    border-radius: 10px;
    padding: 1px 6px;
    z-index: 2;
    margin-top: 0;
}
.pm-bubble img.chat-upload {
    max-width: 220px; height: auto; border-radius: 12px;
    display: block; cursor: pointer;
}
.pm-bubble img.chat-sticker { width: 120px; height: 120px; display: block; }
.pm-bubble audio { max-width: 220px; height: 38px; display: block; border-radius: 18px; }
.msg-time { font-size: 10px; color: #aaa; padding: 0 4px; }

.pm-empty {
    text-align: center; color: rgba(0,0,0,0.3); font-size: 14px;
    margin: auto; padding: 30px 20px; line-height: 1.8;
}

/* ── Action tray ── */
.action-tray {
    background: rgba(255,255,255,0.42);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(255,255,255,0.5);
    display: flex; gap: 6px; padding: 0 12px;
    flex-shrink: 0; 
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    max-height: 0; transition: max-height 0.22s ease, padding 0.22s ease;
}
.action-tray::-webkit-scrollbar {
    height: 3px;
}
.action-tray::-webkit-scrollbar-thumb {
    background: rgba(200,200,200,0.5);
    border-radius: 3px;
}
.action-tray.open { max-height: 90px; padding: 10px 12px; overflow-x: auto; }
.tray-btn {
    flex: 0 0 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 14px;
    background: rgba(255,255,255,0.38);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    cursor: pointer; font-size: 11px; color: #333; font-weight: 500;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.6);
}
.tray-btn:active { background: rgba(255,255,255,0.6); }
.tray-icon { font-size: 22px; line-height: 1; }
.tray-sticker-wrap { flex: 0 0 auto; }
.tray-sticker-wrap .tray-btn { min-width: auto; }

/* Sticker dropdown */
.sticker-dropdown {
    position: fixed;
    left: 50%;
    bottom: 90px;
    transform: translateX(-50%);
    width: min(92vw, 320px); max-height: 240px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: none; flex-wrap: wrap; padding: 8px;
    border-radius: 14px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 8px 28px rgba(0,0,0,0.14);
    z-index: 9999;
}
.sticker-dropdown.show { display: flex; }
.sticker-item {
    width: 40px; height: 40px; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; border: none; background: none;
}
.sticker-item:hover, .sticker-item:active { background: rgba(0,0,0,0.07); }
.sticker-item img { width: 28px; height: 28px; }

/* ── Input bar ── */
.pm-input-bar {
    background: rgba(240,240,240,0.5);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.5);
    padding: 8px 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    display: flex; align-items: center; gap: 7px; flex-shrink: 0;
}
.plus-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #444; flex-shrink: 0;
    transition: background 0.12s, transform 0.2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
}
.plus-btn.open { transform: rotate(45deg); }
.plus-btn:active { background: rgba(255,255,255,0.6); }
#pmInput {
    flex: 1; border: none; border-radius: 22px; padding: 10px 16px;
    font-size: 16px; outline: none; resize: none; max-height: 120px;
    line-height: 1.4; touch-action: manipulation;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    color: #111; transition: box-shadow 0.2s;
}
#pmInput:focus {
    background: rgba(255,255,255,0.68);
    border-color: rgba(231,76,60,0.4);
    box-shadow: 0 2px 12px rgba(231,76,60,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
}
.mic-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: rgba(13,110,253,0.72);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(100,160,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.12s, transform 0.1s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0;
    box-shadow: 0 4px 14px rgba(13,110,253,0.35), inset 0 1px 0 rgba(180,210,255,0.4);
}
.mic-btn:active { transform: scale(0.93); }
.mic-btn.recording { background: rgba(10,88,202,1) !important; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.1);} }
.send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #3355ff 0%, #0022ff 100%) !important;
    border: 1px solid rgba(120,140,255,0.55) !important;
    color: #fff; display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0;
    box-shadow: 0 0 20px rgba(0,34,255,0.8), 0 3px 12px rgba(0,34,255,0.55), inset 0 1px 0 rgba(160,180,255,0.5) !important;
    transition: transform 0.1s, box-shadow 0.12s;
}
.send-btn:active { transform: scale(0.93) !important; }

/* ── Dark mode ── */
html.dark-mode, body.dark-mode {
    background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%) fixed !important;
}
.dark-mode .pm-shell { background: rgba(15,15,25,0.65) !important; }
.dark-mode .pm-row.other .pm-bubble { background: rgba(38,38,55,0.72) !important; border-color: rgba(255,255,255,0.10) !important; color: #e2e2e2 !important; }
.dark-mode .pm-row.other .pm-bubble::before { border-right-color: rgba(38,38,55,0.72) !important; }
.dark-mode .pm-row.me .pm-bubble { background: rgba(18,72,45,0.68) !important; border-color: rgba(70,190,110,0.32) !important; color: #c8efd4 !important; }
.dark-mode .pm-row.me .pm-bubble::after { border-left-color: rgba(18,72,45,0.68) !important; }
.dark-mode .pm-bubble-ts { color: rgba(255,255,255,0.4); }
.dark-mode .pm-input-bar { background: rgba(12,12,22,0.68) !important; border-top-color: rgba(255,255,255,0.08) !important; }
.dark-mode #pmInput { background: rgba(28,28,45,0.75) !important; border-color: rgba(255,255,255,0.12) !important; color: #e2e2e2 !important; }
.dark-mode #pmInput::placeholder { color: rgba(255,255,255,0.3); }
.dark-mode .plus-btn { background: rgba(35,35,55,0.65) !important; border-color: rgba(255,255,255,0.15) !important; color: #ccc !important; }
.dark-mode .action-tray { background: rgba(12,12,22,0.68) !important; border-top-color: rgba(255,255,255,0.08) !important; }
.dark-mode .tray-btn { background: rgba(35,35,58,0.6) !important; border-color: rgba(255,255,255,0.12) !important; color: #ccc !important; }
.dark-mode .sticker-dropdown { background: rgba(25,25,42,0.9) !important; border-color: rgba(255,255,255,0.1) !important; }
.dark-mode .pm-empty { color: rgba(255,255,255,0.3); }

/* ── Lightbox ── */
.lightbox-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 9999;
    align-items: center; justify-content: center;
}
.lightbox-overlay.show { display: flex; }
.lightbox-overlay img { max-width: 96vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
.lightbox-close {
    position: fixed; top: 14px; right: 18px;
    font-size: 36px; color: #fff; cursor: pointer; z-index: 10001;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6); user-select: none;
}
/* Contact modal */
.pm-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 9000;
    align-items: center; justify-content: center;
}
.pm-modal-overlay.show { display: flex; }
.pm-modal-panel {
    background: #fff; border-radius: 18px;
    padding: 20px 18px 16px; width: min(340px, calc(100vw - 32px));
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.dark-mode .pm-modal-panel { background: #1e1e2e; color: #eee; }
.pm-modal-title {
    font-size: 15px; font-weight: 700; margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
}
.pm-modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: #999; line-height: 1; padding: 0;
}
.pm-modal-input {
    width: 100%; border: 1.5px solid #ddd; border-radius: 10px;
    padding: 9px 12px; font-size: 15px; margin-bottom: 10px;
    box-sizing: border-box; outline: none;
}
.dark-mode .pm-modal-input { background: #2a2a3e; border-color: #444; color: #eee; }
.pm-modal-btn {
    width: 100%; padding: 11px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
}
.pm-modal-btn.primary { background: #0d6efd; color: #fff; }
.pm-modal-btn.addrbook { background: rgba(37,211,102,0.15); color: #16a34a; border: 1px solid rgba(37,211,102,0.3); }

/* ── Link preview ── */
.link-preview-card { display:flex; flex-direction:column; margin-top:7px; border-radius:10px; overflow:hidden; border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.88); text-decoration:none; color:inherit; max-width:260px; }
.link-preview-thumb { width:100%; max-height:120px; object-fit:cover; display:block; }
.link-preview-info  { padding:7px 9px; }
.link-preview-site  { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
.link-preview-title { font-size:13px; font-weight:700; line-height:1.3; margin-bottom:2px; }
.link-preview-desc  { font-size:11px; color:#666; line-height:1.4; }
.dark-mode .link-preview-card { background:rgba(30,30,50,0.88); border-color:rgba(255,255,255,0.12); }
.dark-mode .link-preview-title { color:#eee; }
.dark-mode .link-preview-desc  { color:#aaa; }

/* ── Tic-tac-toe game ── */
.game-overlay { display:none; position:fixed; inset:0; z-index:9500; background:rgba(0,0,0,0.55); align-items:center; justify-content:center; }
.game-overlay.show { display:flex; }
.game-panel { background:#fff; border-radius:20px; width:min(320px,calc(100vw - 32px)); padding:20px; box-shadow:0 12px 40px rgba(0,0,0,0.25); }
.dark-mode .game-panel { background:#1e1e2e; color:#eee; }
.game-title  { font-size:18px; font-weight:700; text-align:center; margin-bottom:4px; }
.game-status { font-size:13px; text-align:center; color:#888; margin-bottom:14px; min-height:18px; }
.ttt-board   { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.ttt-cell    { aspect-ratio:1; border-radius:12px; background:rgba(0,0,0,0.05); display:flex; align-items:center; justify-content:center; font-size:34px; cursor:pointer; border:2px solid transparent; transition:background .15s, border-color .15s; }
.dark-mode .ttt-cell { background:rgba(255,255,255,0.07); }
.ttt-cell:hover:not(.taken) { background:rgba(13,110,253,0.1); border-color:rgba(13,110,253,0.3); }
.ttt-cell.taken  { cursor:default; }
.ttt-cell.win-cell { background:rgba(37,211,102,0.22); border-color:rgba(37,211,102,0.55); }
.game-btns { display:flex; gap:8px; }
.game-btn  { flex:1; padding:10px; border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; }
.game-btn.primary   { background:#0d6efd; color:#fff; }
.game-btn.secondary { background:rgba(0,0,0,0.07); color:#555; }
.dark-mode .game-btn.secondary { background:rgba(255,255,255,0.1); color:#ddd; }
/* Blocked banner */
.pm-blocked-banner { background:rgba(220,53,69,0.12); color:#dc3545; text-align:center; padding:10px; font-size:13px; font-weight:600; display:none; }
.pm-blocked-banner.show { display:block; }

/* Column wrapper: stacks bubble → ts-below → reactions vertically */
.pm-msg-col {
    display: flex; flex-direction: column; max-width: 100%;
}
.pm-row.me    .pm-msg-col { align-items: flex-end; }
.pm-row.other .pm-msg-col { align-items: flex-start; }

/* Timestamp below sticker / voice-note */
.pm-bubble-ts-below {
    font-size: 10px; color: #999; white-space: nowrap;
    padding: 2px 2px 0;
}
.dark-mode .pm-bubble-ts-below { color: rgba(255,255,255,0.38); }

/* PM Reactions */
.pm-reactions { display:flex; gap:5px; margin-top:3px; }
.pm-react-btn {
    display:flex; align-items:center; gap:3px; padding:2px 8px;
    border-radius:12px; border:1px solid rgba(0,0,0,0.1);
    background:rgba(255,255,255,0.7); font-size:12px; cursor:pointer;
    transition:background 0.12s, transform 0.1s; color:#444;
}
.pm-react-btn:active { transform:scale(0.93); }
.pm-react-btn.liked    { background:rgba(37,211,102,0.22); border-color:rgba(37,211,102,0.4); }
.pm-react-btn.disliked { background:rgba(220,53,69,0.14);  border-color:rgba(220,53,69,0.3); }
.dark-mode .pm-react-btn { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.15); color:#eee; }

/* Game notification banner */
.game-notif {
    display:none; background:rgba(13,110,253,0.12); color:#0d6efd;
    padding:8px 14px; font-size:13px; font-weight:600;
    text-align:center; cursor:pointer;
}
.game-notif.show { display:block; }
</style>
</head>
<body>

<div class="pm-shell">
    <!-- Header -->
    <div class="pm-header">
        <button class="pm-back-btn" onclick="window.close()" title="Close">&#8592;</button>
        <img class="pm-header-avatar" id="pmHeaderAvatar" src="https://i.imgur.com/PVBYWRJ.png" alt="">
        <div class="pm-header-info">
            <div class="pm-header-name" id="pmHeaderName">…</div>
            <div class="pm-header-status">
                <span class="pm-header-status-dot" id="pmStatusDot"></span>
                <span id="pmStatusText">Online</span>
            </div>
        </div>
        <button class="pm-header-btn" onclick="initiateCall()" title="Call">📞</button>
        <button class="pm-header-btn" id="pmBlockBtn" onclick="toggleBlockPeer()" title="Block user">🚫</button>
    </div>

    <!-- Blocked banner -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
// ── Init ──────────────────────────────────────────────────────────────────────
var params  = new URLSearchParams(window.location.search);
var PEER    = params.get('peer')    || '';
var AVATAR  = params.get('avatar')  || 'https://i.imgur.com/PVBYWRJ.png';
var STATUS  = params.get('status')  || 'Online';
var ME      = localStorage.getItem('myUserName') || '';
var CHAT_ID = [ME, PEER].sort().join('__pm__');

var _loadedIds = new Set();
var _recording = false, _mediaRecorder = null, _audioChunks = [];

window.onload = function () {
    if (!ME)   { window.location.href = 'index.html'; return; }
    if (!PEER) { document.getElementById('pmEmpty').textContent = 'No user specified.'; return; }

    // Portal sticker menu to <body> so it escapes overflow:hidden/auto on the tray
    document.body.appendChild(document.getElementById('stickerMenu'));
    // Block UI state
    _updateBlockUI();

    // Apply saved theme
    if (localStorage.getItem('darkMode') === '1') {
        document.documentElement.classList.add('dark-mode');
        document.body.classList.add('dark-mode');
    }

    // Header
    document.getElementById('pmHeaderName').textContent   = PEER;
    document.getElementById('pmHeaderAvatar').src         = decodeURIComponent(AVATAR);
    document.getElementById('pmStatusText').textContent   = STATUS;
    document.title = 'Chat with ' + PEER + ' — ApplesChat';

    // File input
    document.getElementById('pmFileInput').onchange = function () {
        var files = this.files;
        if (!files.length) return;
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var reader = new FileReader();
            (function(f) {
                reader.onload = function (e) {
                    if (f.type.startsWith('video/')) {
                        sendMsg({ video_data: e.target.result, video_name: f.name });
                    } else {
                        var img = new Image();
                        img.onload = function () {
                            var canvas = document.createElement('canvas');
                            var max = 800, scale = Math.min(1, max / Math.max(img.width, img.height));
                            canvas.width  = Math.round(img.width  * scale);
                            canvas.height = Math.round(img.height * scale);
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            sendMsg({ image_data: canvas.toDataURL('image/jpeg', 0.75) });
                        };
                        img.src = e.target.result;
                    }
                };
            })(file);
            reader.readAsDataURL(file);
        }
        this.value = '';
    };

    document.getElementById('pmCameraInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            var img = new Image();
            img.onload = function () {
                var canvas = document.createElement('canvas');
                var max = 800, scale = Math.min(1, max / Math.max(img.width, img.height));
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                sendMsg({ image_data: canvas.toDataURL('image/jpeg', 0.75) });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    document.getElementById('pmDocInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            sendMsg({ doc_data: e.target.result, doc_name: file.name, doc_size: file.size });
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    document.getElementById('pmAudioInput').onchange = function () {
        var file = this.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
            sendMsg({ audio_file_data: e.target.result, audio_file_name: file.name });
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    // Outside click closes tray
    document.addEventListener('click', function (e) {
        if (!document.getElementById('plusBtn').contains(e.target) &&
            !document.getElementById('actionTray').contains(e.target)) {
            document.getElementById('stickerMenu').classList.remove('show');
            closeTray();
        }
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
    });

    loadMessages();
    listenOnlineStatus();
    _listenGameNotif();
};

// ── Firebase ──────────────────────────────────────────────────────────────────
function loadMessages() {
    try {
        var ref = firebase.database()
            .ref('private_messages/' + CHAT_ID)
            .orderByChild('created_at').limitToLast(80);

        ref.once('value', function (snap) {
            var body = document.getElementById('pmBody');
            body.innerHTML = '';
            var rows = [];
            snap.forEach(function (c) { rows.push({ key: c.key, val: c.val() }); });
            if (rows.length === 0) {
                body.innerHTML = '<div class="pm-empty">No messages yet.<br>Say hi! 👋</div>';
            } else {
                rows.forEach(function (r) { _loadedIds.add(r.key); appendMsg(r.val, r.key); });
                scrollBottom();
            }
        });

        ref.on('child_added', function (snap) {
            if (_loadedIds.has(snap.key)) return;
            _loadedIds.add(snap.key);
            var empty = document.getElementById('pmEmpty');
            if (empty) empty.remove();
            appendMsg(snap.val(), snap.key);
            scrollBottom();
        });
    } catch (e) { console.warn(e); }
}

function listenOnlineStatus() {
    try {
        firebase.database().ref('users/' + PEER).on('value', function (snap) {
            var u = snap.val();
            var now = Date.now(), threshold = 3 * 60 * 1000;
            var online = u && u.lastSeen && (now - u.lastSeen < threshold);
            var dot = document.getElementById('pmStatusDot');
            dot.className = 'pm-header-status-dot' + (online ? '' : ' offline');
            document.getElementById('pmStatusText').textContent =
                online ? (u.status || 'Online') : 'Offline';
            if (u && u.avatar) document.getElementById('pmHeaderAvatar').src = u.avatar;
        });
    } catch (e) {}
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendMsg(extra) {
    var input = document.getElementById('pmInput');
    var text  = input.value.trim();
    extra = extra || {};
    if (!text && !extra.image_data && !extra.audio_data && !extra.sticker_url && !extra.doc_data && !extra.audio_file_data && !extra.contact_name && !extra.event_title && !extra.poll_question && !extra.video_data) return;
    var myAvatar = localStorage.getItem('avatarImgData') || 'https://i.imgur.com/PVBYWRJ.png';
    var myStatus = localStorage.getItem('status') || '';
    input.value = ''; input.style.height = 'auto'; updateSendMic();
    var payload = Object.assign({
        from: ME, to: PEER,
        message: text || null,
        avatar: myAvatar, status: myStatus,
        created_at: firebase.database.ServerValue.TIMESTAMP
    }, extra);
    try { firebase.database().ref('private_messages/' + CHAT_ID).push(payload); }
    catch (e) { console.warn(e); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function appendMsg(msg, msgKey) {
    var isMe = msg.from === ME;
    var body = document.getElementById('pmBody');
    var row  = document.createElement('div');
    row.className = 'pm-row ' + (isMe ? 'me' : 'other');
    var bubble = document.createElement('div');
    bubble.className = 'pm-bubble';
    var isMedia = false;
    var isVisualMedia = false;

    if (msg.sticker_url) {
        var si = document.createElement('img');
        si.className = 'chat-sticker'; si.src = msg.sticker_url;
        bubble.appendChild(si); isMedia = true;
    } else if (msg.audio_data) {
        var au = document.createElement('audio');
        au.controls = true; au.src = msg.audio_data;
        bubble.appendChild(au); isMedia = true;
    } else if (msg.audio_file_data) {
        var au = document.createElement('audio');
        au.controls = true; au.src = msg.audio_file_data;
        bubble.appendChild(au); isMedia = true;
    } else if (msg.video_data) {
        var vid = document.createElement('video');
        vid.controls = true; vid.src = msg.video_data;
        vid.style.maxWidth = '220px';
        vid.style.borderRadius = '12px';
        bubble.appendChild(vid); isMedia = true; isVisualMedia = true;
    } else if (msg.poll_question) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '8px';
        title.textContent = msg.poll_question;
        bubble.appendChild(title);
        var options = [];
        try { options = JSON.parse(msg.poll_options || '[]'); } catch (e) {}
        options.forEach(function (opt) {
            var item = document.createElement('div');
            item.style.padding = '8px 10px';
            item.style.borderRadius = '12px';
            item.style.background = 'rgba(255,255,255,0.8)';
            item.style.marginBottom = '6px';
            item.style.color = '#222';
            item.textContent = opt;
            bubble.appendChild(item);
        });
        isMedia = true;
    } else if (msg.event_title) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '6px';
        title.textContent = msg.event_title;
        bubble.appendChild(title);
        if (msg.event_date) {
            var dateLine = document.createElement('div');
            dateLine.textContent = 'Date: ' + msg.event_date + (msg.event_time ? ' ' + msg.event_time : '');
            bubble.appendChild(dateLine);
        }
        if (msg.event_location) {
            var loc = document.createElement('div');
            loc.textContent = 'Location: ' + msg.event_location;
            bubble.appendChild(loc);
        }
        isMedia = true;
    } else if (msg.doc_data) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '8px';
        title.textContent = msg.doc_name || 'Document';
        bubble.appendChild(title);
        var link = document.createElement('a');
        link.href = msg.doc_data;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = '📂 Open';
        link.style.display = 'inline-block';
        link.style.padding = '10px 14px';
        link.style.borderRadius = '12px';
        link.style.background = '#f0f0f0';
        link.style.color = '#111';
        link.style.textDecoration = 'none';
        bubble.appendChild(link);
        if (msg.doc_size) {
            var size = document.createElement('div');
            size.style.fontSize = '12px';
            size.style.color = '#666';
            size.style.marginTop = '6px';
            size.textContent = Math.round(msg.doc_size / 1024) + ' KB';
            bubble.appendChild(size);
        }
        isMedia = true;
    } else if (msg.contact_name) {
        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '6px';
        title.textContent = msg.contact_name;
        bubble.appendChild(title);
        if (msg.contact_phone) {
            var phone = document.createElement('div');
            phone.textContent = 'Phone: ' + msg.contact_phone;
            bubble.appendChild(phone);
        }
        if (msg.contact_email) {
            var email = document.createElement('div');
            email.textContent = 'Email: ' + msg.contact_email;
            bubble.appendChild(email);
        }
        isMedia = true;
    } else {
        if (msg.message) {
            var sp = document.createElement('span');
            sp.innerHTML = embedUrls(msg.message);
            bubble.appendChild(sp);
            // Link preview
            var _urlM = msg.message.match(/(https?:\/\/[^\s]+)/);
            if (_urlM) { (function(url,b){ setTimeout(function(){ _pmFetchLinkPreview(url,b); },200); })(_urlM[1], bubble); }
        }
        if (msg.image_data) {
            if (msg.message) bubble.appendChild(document.createElement('br'));
            var im = document.createElement('img');
            im.className = 'chat-upload'; im.src = msg.image_data;
            im.onclick = function () { openLightbox(msg.image_data); };
            bubble.appendChild(im);
            if (!msg.message) { isMedia = true; isVisualMedia = true; }
        }
    }

    if (isMedia) bubble.classList.add('media-bubble');
    if (isVisualMedia) bubble.classList.add('visual-media');

    // Column wrapper: bubble → ts → reactions stacked vertically
    var msgCol = document.createElement('div');
    msgCol.className = 'pm-msg-col';
    msgCol.appendChild(bubble);

    if (msg.created_at) {
        if (isMedia && !isVisualMedia) {
            // Sticker / voice note: ts below bubble
            var ts = document.createElement('span');
            ts.className = 'pm-bubble-ts-below';
            ts.textContent = formatTime(msg.created_at);
            msgCol.appendChild(ts);
        } else {
            // Text / visual media: ts inside bubble (absolute bottom-right)
            var ts = document.createElement('span');
            ts.className = 'pm-bubble-ts';
            ts.textContent = formatTime(msg.created_at);
            bubble.appendChild(ts);
        }
    }

    // ── Reactions ──
    if (msgKey) {
        var reacts = document.createElement('div');
        reacts.className = 'pm-reactions';
        var likeBtn    = document.createElement('button');
        likeBtn.className = 'pm-react-btn';
        likeBtn.innerHTML = '👍 <span>0</span>';
        var dislikeBtn = document.createElement('button');
        dislikeBtn.className = 'pm-react-btn';
        dislikeBtn.innerHTML = '👎 <span>0</span>';
        likeBtn.onclick    = function(){ _pmToggleReaction(msgKey, 'like'); };
        dislikeBtn.onclick = function(){ _pmToggleReaction(msgKey, 'dislike'); };
        reacts.appendChild(likeBtn);
        reacts.appendChild(dislikeBtn);
        msgCol.appendChild(reacts);
        try {
            firebase.database().ref('pm_reactions/' + CHAT_ID + '/' + msgKey).on('value', function(snap) {
                var d  = snap.val() || {};
                var lk = d.likes    ? Object.keys(d.likes).length    : 0;
                var dk = d.dislikes ? Object.keys(d.dislikes).length : 0;
                likeBtn.querySelector('span').textContent    = lk || '0';
                dislikeBtn.querySelector('span').textContent = dk || '0';
                likeBtn.classList.toggle('liked',      !!(d.likes    && d.likes[ME]));
                dislikeBtn.classList.toggle('disliked', !!(d.dislikes && d.dislikes[ME]));
            });
        } catch(e) {}
    }

    row.appendChild(msgCol);
    body.appendChild(row);
}

// ── Voice ─────────────────────────────────────────────────────────────────────
function toggleVoice() {
    _recording ? stopRecording() : startRecording();
}

function startRecording() {
    if (!navigator.mediaDevices) { alert('Mic not supported'); return; }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        _audioChunks = [];
        _mediaRecorder = new MediaRecorder(stream);
        _mediaRecorder.ondataavailable = function (e) { if (e.data.size > 0) _audioChunks.push(e.data); };
        _mediaRecorder.onstop = function () {
            var blob = new Blob(_audioChunks, { type: 'audio/webm' });
            var reader = new FileReader();
            reader.onload = function (ev) { sendMsg({ audio_data: ev.target.result }); };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(function (t) { t.stop(); });
        };
        _mediaRecorder.start();
        _recording = true;
        document.getElementById('micBtn').classList.add('recording');
    }).catch(function () { alert('Mic access denied'); });
}

function stopRecording() {
    if (_mediaRecorder) _mediaRecorder.stop();
    _recording = false;
    document.getElementById('micBtn').classList.remove('recording');
}

}

<script>
// ── Block peer ────────────────────────────────────────────────────────────────
function _pmIsBlocked(u) {
    try { return (JSON.parse(localStorage.getItem('blocked')||'[]')).includes(u); } catch(e){ return false; }
}
function toggleBlockPeer() {
    var blocked = [];
    try { blocked = JSON.parse(localStorage.getItem('blocked')||'[]'); } catch(e){}
    var idx = blocked.indexOf(PEER);
    if (idx >= 0) { blocked.splice(idx,1); } else { blocked.push(PEER); }
    localStorage.setItem('blocked', JSON.stringify(blocked));
    _updateBlockUI();
}
function _updateBlockUI() {
    var isBlocked = _pmIsBlocked(PEER);
    var btn = document.getElementById('pmBlockBtn');
    if (btn) btn.title = isBlocked ? 'Unblock user' : 'Block user';
    var banner = document.getElementById('pmBlockedBanner');
    if (banner) banner.classList.toggle('show', isBlocked);
    var inputBar = document.querySelector('.pm-input-bar');
    if (inputBar) inputBar.style.pointerEvents = isBlocked ? 'none' : '';
}

// ── Link preview ──────────────────────────────────────────────────────────────
function _pmFetchLinkPreview(url, container) {
    fetch('https://api.microlink.io/?url=' + encodeURIComponent(url))
    .then(function(r){ return r.json(); })
    .then(function(data) {
        if (data.status !== 'success') return;
        var d     = data.data || {};
        var title = d.title || '';
        var desc  = d.description || '';
        var img   = (d.image && d.image.url) ? d.image.url : '';
        var site  = d.publisher || (url.match(/^https?:\/\/([^/]+)/)||[])[1] || '';
        if (!title && !img) return;
        var a = document.createElement('a');
        a.className = 'link-preview-card'; a.href = url; a.target = '_blank'; a.rel = 'noopener';
        if (img) { var im = document.createElement('img'); im.className='link-preview-thumb'; im.src=img; a.appendChild(im); }
        var info = document.createElement('div'); info.className = 'link-preview-info';
        if (site)  { var s=document.createElement('div'); s.className='link-preview-site';  s.textContent=site;              info.appendChild(s); }
        if (title) { var t=document.createElement('div'); t.className='link-preview-title'; t.textContent=title.slice(0,80); info.appendChild(t); }
        if (desc)  { var di=document.createElement('div'); di.className='link-preview-desc';  di.textContent=desc.slice(0,120); info.appendChild(di); }
        a.appendChild(info);
        container.appendChild(a);
    }).catch(function(){});
}

// ── Location sharing ──────────────────────────────────────────────────────────
function shareLocation() {
    if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
    navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude.toFixed(6);
        var lng = pos.coords.longitude.toFixed(6);
        var url = 'https://maps.google.com/?q=' + lat + ',' + lng;
        sendMsg({ message: '📍 My Location: ' + url });
    }, function() { alert('Location access denied or unavailable.'); });
}

// ── PM Reactions ──────────────────────────────────────────────────────────────
function _pmToggleReaction(msgKey, type) {
    var me = ME;
    var ref = firebase.database().ref('pm_reactions/' + CHAT_ID + '/' + msgKey);
    ref.once('value', function(snap) {
        var d = snap.val() || {};
        var path = (type === 'like' ? 'likes' : 'dislikes') + '/' + me;
        var oppPath = (type === 'like' ? 'dislikes' : 'likes') + '/' + me;
        var already = d[type === 'like' ? 'likes' : 'dislikes'] &&
                      d[type === 'like' ? 'likes' : 'dislikes'][me];
        var updates = {};
        updates[path] = already ? null : true;
        updates[oppPath] = null; // remove opposite
        ref.update(updates);
    });
}

// ── Games ─────────────────────────────────────────────────────────────────────
var _tttRef = null;
var _rpsRef = null;
var _gameOpen = false;

function openGamePanel() {
    _gameOpen = true;
    document.getElementById('gameOverlay').classList.add('show');
    document.getElementById('gameNotif').classList.remove('show');
    _showGameMenu();
    _listenGameNotif(); // start listening if not already
}
function closeGamePanel() {
    _gameOpen = false;
    document.getElementById('gameOverlay').classList.remove('show');
    if (_tttRef) { _tttRef.off(); _tttRef = null; }
    if (_rpsRef) { _rpsRef.off(); _rpsRef = null; }
}
function _showGameMenu() {
    document.getElementById('gameMenu').style.display = '';
    document.getElementById('gameTTT').style.display  = 'none';
    document.getElementById('gameRPS').style.display  = 'none';
    if (_tttRef) { _tttRef.off(); _tttRef = null; }
    if (_rpsRef) { _rpsRef.off(); _rpsRef = null; }
}
function startGame(type) {
    document.getElementById('gameMenu').style.display = 'none';
    if (type === 'ttt') {
        document.getElementById('gameTTT').style.display = '';
        _tttConnect();
    } else if (type === 'rps') {
        document.getElementById('gameRPS').style.display = '';
        _rpsConnect();
    }
}

// ── Game invite notification ──────────────────────────────────────────────────
var _gameNotifRef = null;
var _lastGameType = '';
function _listenGameNotif() {
    if (_gameNotifRef) return; // already listening
    try {
        _gameNotifRef = firebase.database().ref('games/' + CHAT_ID);
        _gameNotifRef.on('value', function(snap) {
            var g = snap.val();
            if (!g || _gameOpen) return;
            var isNewGame = (g.status === 'playing' || g.status === 'choosing') && g.initiator !== ME;
            if (isNewGame) {
                var typeName = g.type === 'rps' ? 'Rock Paper Scissors' : 'Tic-Tac-Toe';
                document.getElementById('gameNotifText').textContent = PEER + ' wants to play ' + typeName + '!';
                document.getElementById('gameNotif').classList.add('show');
            }
        });
    } catch(e) {}
}

// ── Tic-Tac-Toe ───────────────────────────────────────────────────────────────
function _tttConnect() {
    if (_tttRef) _tttRef.off();
    _tttRef = firebase.database().ref('games/' + CHAT_ID);
    _tttRef.on('value', function(snap) {
        var g = snap.val();
        if (!g || g.type !== 'ttt') {
            document.getElementById('gameStatus').textContent = 'Start a new game!';
            return;
        }
        _tttRender(g);
    });
}
function tttNewGame() {
    var g = { type:'ttt', board:['','','','','','','','',''], X:ME, O:PEER, current:'X', status:'playing', initiator:ME };
    firebase.database().ref('games/' + CHAT_ID).set(g);
    sendMsg({ message: '🎮 Started a Tic-Tac-Toe game! Open Games in the tray to play.' });
}
function tttMove(i) {
    if (!_tttRef) return;
    _tttRef.once('value', function(snap) {
        var g = snap.val();
        if (!g || g.status !== 'playing') return;
        var mark = g.X === ME ? 'X' : (g.O === ME ? 'O' : '');
        if (!mark || g.current !== mark) return;
        if (g.board[i]) return;
        var board = g.board.slice();
        board[i] = mark;
        var winner = _tttCheckWinner(board);
        var full   = board.every(function(c){ return c !== ''; });
        var update = { board:board, current: mark === 'X' ? 'O' : 'X' };
        if (winner) { update.status = 'won'; update.winner = ME; }
        else if (full) { update.status = 'draw'; }
        _tttRef.update(update);
    });
}
function _tttCheckWinner(b) {
    var lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(function(l){ return b[l[0]] && b[l[0]] === b[l[1]] && b[l[1]] === b[l[2]]; });
}
function _tttRender(g) {
    var cells = document.querySelectorAll('.ttt-cell');
    var winLine = null;
    var lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    if (g.status === 'won') {
        winLine = lines.find(function(l){ return g.board[l[0]] && g.board[l[0]]===g.board[l[1]] && g.board[l[1]]===g.board[l[2]]; });
    }
    cells.forEach(function(cell, i) {
        cell.textContent = g.board[i] === 'X' ? '❌' : g.board[i] === 'O' ? '⭕' : '';
        cell.classList.toggle('taken', !!g.board[i]);
        cell.classList.toggle('win-cell', !!(winLine && winLine.includes(i)));
    });
    var myMark = g.X === ME ? 'X' : 'O';
    var statusEl = document.getElementById('gameStatus');
    if (g.status === 'won')        statusEl.textContent = g.winner === ME ? '🎉 You won!' : '😞 ' + g.winner + ' won!';
    else if (g.status === 'draw')  statusEl.textContent = "🤝 It's a draw!";
    else if (g.current === myMark) statusEl.textContent = '✅ Your turn (' + (myMark === 'X' ? '❌' : '⭕') + ')';
    else                           statusEl.textContent = '⏳ Waiting for ' + PEER + '…';
}

// ── Rock Paper Scissors ───────────────────────────────────────────────────────
var _RPS_EMOJI = { rock:'✊', paper:'✋', scissors:'✌️' };
var _RPS_WIN   = { rock:'scissors', paper:'rock', scissors:'paper' };

function _rpsConnect() {
    if (_rpsRef) _rpsRef.off();
    _rpsRef = firebase.database().ref('games/' + CHAT_ID);
    _rpsRef.on('value', function(snap) {
        var g = snap.val();
        if (!g || g.type !== 'rps') {
            document.getElementById('rpsStatus').textContent = 'Start a new round!';
            document.getElementById('rpsResult').textContent = '';
            return;
        }
        _rpsRender(g);
    });
}
function rpsNewRound() {
    var g = { type:'rps', choices:{}, scores:{}, status:'choosing', initiator:ME, p1:ME, p2:PEER };
    firebase.database().ref('games/' + CHAT_ID).set(g);
    sendMsg({ message: '✊✋✌️ Started Rock Paper Scissors! Open Games in the tray to play.' });
}
function rpsPick(choice) {
    var ref = firebase.database().ref('games/' + CHAT_ID);
    ref.once('value', function(snap) {
        var g = snap.val();
        if (!g || g.type !== 'rps' || g.status !== 'choosing') return;
        if (g.choices && g.choices[ME]) return; // already picked
        var update = {};
        update['choices/' + ME] = choice;
        // check if both picked after this
        var otherChoice = g.choices ? g.choices[PEER] : null;
        if (otherChoice) {
            update['status'] = 'result';
        }
        ref.update(update);
    });
}
function _rpsRender(g) {
    var statusEl = document.getElementById('rpsStatus');
    var resultEl = document.getElementById('rpsResult');
    var myChoice = g.choices ? g.choices[ME] : null;
    var peerChoice = g.choices ? g.choices[PEER] : null;

    if (g.status === 'choosing') {
        statusEl.textContent = myChoice ? '✅ Waiting for ' + PEER + '…' : 'Pick your move!';
        resultEl.textContent = myChoice ? 'You chose ' + _RPS_EMOJI[myChoice] : '';
    } else if (g.status === 'result') {
        var myE = _RPS_EMOJI[myChoice] || '?';
        var peerE = _RPS_EMOJI[peerChoice] || '?';
        resultEl.textContent = 'You: ' + myE + '  vs  ' + PEER + ': ' + peerE;
        if (!myChoice || !peerChoice) { statusEl.textContent = 'Waiting…'; return; }
        if (myChoice === peerChoice) {
            statusEl.textContent = "🤝 It's a tie!";
        } else if (_RPS_WIN[myChoice] === peerChoice) {
            statusEl.textContent = '🎉 You win this round!';
        } else {
            statusEl.textContent = '😞 ' + PEER + ' wins this round!';
        }
    }
}
</script>

<script>
function openContactModal() {
    document.getElementById('pmContactModal').classList.add('show');
}
function closePMContactModal() {
    document.getElementById('pmContactModal').classList.remove('show');
}
async function pmPickFromAddressBook() {
    if (!('contacts' in navigator)) {
        alert('Address book not supported in this browser.\nTry Chrome on Android or Safari on iOS 14.5+.');
        return;
    }
    try {
        var contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: false });
        if (!contacts || contacts.length === 0) return;
        var c = contacts[0];
        document.getElementById('pmContactName').value  = (c.name  && c.name[0])  || '';
        document.getElementById('pmContactPhone').value = (c.tel   && c.tel[0])   || '';
        document.getElementById('pmContactEmail').value = (c.email && c.email[0]) || '';
    } catch (err) { console.warn('Contact picker error:', err); }
}
function sendPMContact() {
    var name  = document.getElementById('pmContactName').value.trim();
    var phone = document.getElementById('pmContactPhone').value.trim();
    var email = document.getElementById('pmContactEmail').value.trim();
    if (!name) { document.getElementById('pmContactName').focus(); return; }
    sendMsg({ contact_name: name, contact_phone: phone, contact_email: email });
    closePMContactModal();
    ['pmContactName','pmContactPhone','pmContactEmail'].forEach(function(id){ document.getElementById(id).value=''; });
}
</script>
